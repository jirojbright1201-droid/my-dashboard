<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Investment Dashboard — Mockup</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --blue:#0052ff; --blue-deep:#0043d6; --blue-soft:rgba(0,82,255,.08);
    --up:#098551; --up-soft:rgba(9,133,81,.12); --down:#cf202f; --down-soft:rgba(207,32,47,.10);
    --bg:#ffffff; --surface:#ffffff; --surface-2:#f5f6f8; --surface-3:#eef0f3;
    --text:#0a0b0d; --silver:#5b616e; --dim:#8a919e;
    --border:#d7dae0; --border-soft:#ebecf0;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{font-family:'Inter',system-ui,Arial,sans-serif; background:var(--bg); color:var(--text); -webkit-font-smoothing:antialiased;}
  .num{font-variant-numeric:tabular-nums;}
  .pos{color:var(--up);} .neg{color:var(--down);}

  .topbar{position:sticky; top:0; z-index:40; background:var(--bg); border-bottom:1px solid var(--border-soft);
    display:flex; align-items:center; gap:14px; padding:0 22px; height:58px;}
  .topbar h1{font-size:1.2rem; font-weight:800; color:var(--blue); white-space:nowrap;}
  .tabs{display:flex; gap:2px; flex:1; overflow-x:auto;}
  .tabs::-webkit-scrollbar{display:none;}
  .tab-btn{background:none; border:none; cursor:pointer; padding:6px 13px; border-radius:999px;
    font-size:.8125rem; font-weight:600; color:var(--silver); white-space:nowrap; transition:.15s;}
  .tab-btn:hover{color:var(--text); background:var(--surface-2);}
  .tab-btn.active{color:var(--text); background:var(--surface-3);}
  .btn-upd{background:var(--blue); color:#fff; border:none; border-radius:999px; padding:7px 13px;
    font-size:.73rem; font-weight:700; cursor:pointer; white-space:nowrap; flex-shrink:0;}
  .btn-upd:hover{background:var(--blue-deep);}
  .ts{font-size:.68rem; color:var(--dim); white-space:nowrap; flex-shrink:0;}

  .mockban{background:#fff8e6; border-bottom:1px solid #f0d98a; color:#9a6700; font-size:.73rem; text-align:center; padding:5px 12px; font-weight:600;}

  .wrap{max-width:1080px; margin:0 auto; padding:20px 16px 64px;}
  .tab-content{display:none;} .tab-content.active{display:block; animation:fade .18s ease;}
  @keyframes fade{from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:none;}}
  .sec-title{font-size:.66rem; color:var(--silver); font-weight:700; text-transform:uppercase; letter-spacing:1.1px; margin:22px 0 11px; display:flex; justify-content:space-between; align-items:center;}
  .sec-title:first-child{margin-top:0;}
  .link{color:var(--blue); font-size:.74rem; font-weight:700; cursor:pointer; text-transform:none; letter-spacing:0;}
  .link:hover{text-decoration:underline;}

  .card{background:var(--surface); border:1px solid var(--border-soft); border-radius:14px; padding:18px 20px;}

  /* KPI */
  .kpis{display:grid; grid-template-columns:repeat(3,1fr); gap:12px;}
  .kpi .lbl{font-size:.65rem; color:var(--silver); font-weight:700; text-transform:uppercase; letter-spacing:.9px; margin-bottom:7px;}
  .kpi .val{font-size:1.45rem; font-weight:800; letter-spacing:-.5px;}
  .kpi .sub{font-size:.76rem; margin-top:5px; color:var(--silver);}
  .chip{display:inline-flex; align-items:center; gap:3px; font-size:.7rem; font-weight:700; padding:2px 8px; border-radius:999px;}
  .chip.up{background:var(--up-soft); color:var(--up);} .chip.down{background:var(--down-soft); color:var(--down);} .chip.flat{background:var(--surface-3); color:var(--silver);}

  .grid2{display:grid; grid-template-columns:1.45fr 1fr; gap:22px;}
  .chart-wrap{position:relative; height:230px;}

  /* table */
  .tbl-card{background:var(--surface); border:1px solid var(--border-soft); border-radius:14px; overflow:hidden;}
  table{width:100%; border-collapse:collapse; font-size:.85rem;}
  thead th{font-size:.64rem; text-transform:uppercase; letter-spacing:.5px; color:var(--silver); font-weight:700;
    text-align:right; padding:12px 14px; background:var(--surface-2); white-space:nowrap; cursor:pointer; user-select:none;}
  thead th:first-child{text-align:left;}
  thead th .ar{opacity:.45; font-size:.7em;}
  tbody td{padding:12px 14px; border-top:1px solid var(--border-soft); text-align:right; white-space:nowrap;}
  tbody td:first-child{text-align:left;}
  tbody tr{cursor:pointer; transition:background .12s;}
  tbody tr:hover{background:var(--surface-2);}
  .tk{font-weight:800;} .tk small{display:block; font-weight:500; color:var(--dim); font-size:.7rem; margin-top:1px;}
  .go{color:var(--dim); font-weight:700;}

  /* toolbar */
  .toolbar{display:flex; gap:8px; align-items:center; margin-bottom:12px; flex-wrap:wrap;}
  .fchip{background:var(--surface-2); border:1px solid transparent; border-radius:999px; padding:6px 13px; font-size:.76rem; font-weight:600; color:var(--silver); cursor:pointer;}
  .fchip.on{border-color:var(--blue); color:var(--blue); background:var(--blue-soft);}
  .search{flex:1; min-width:130px; background:var(--surface-2); border:1px solid var(--border-soft); border-radius:999px; padding:8px 14px; font-size:.8rem; color:var(--text); font-family:inherit;}
  .search:focus{outline:none; border-color:var(--blue);}

  /* market */
  .idx-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:10px;}
  .idx{background:var(--surface-2); border-radius:12px; padding:13px 15px;}
  .idx .n{font-size:.7rem; color:var(--silver); font-weight:700;}
  .idx .p{font-size:1.12rem; font-weight:800; margin:3px 0 5px;}
  .sector{display:flex; align-items:center; gap:11px; padding:7px 0;}
  .sector .s-name{width:135px; font-size:.8rem; font-weight:600; flex-shrink:0;}
  .sector .s-bar{flex:1; height:7px; background:var(--surface-3); border-radius:999px; position:relative; overflow:hidden;}
  .sector .s-fill{position:absolute; top:0; height:100%; border-radius:999px;}
  .sector .s-val{width:52px; text-align:right; font-size:.78rem; font-weight:700; font-variant-numeric:tabular-nums;}

  .feed{max-height:420px; overflow-y:auto; padding-right:4px;}
  .feed::-webkit-scrollbar{width:6px;} .feed::-webkit-scrollbar-thumb{background:var(--border-soft); border-radius:3px;}
  .news{border:1px solid var(--border-soft); border-radius:11px; padding:12px 15px; margin-bottom:9px;}
  .news .n-tag{font-size:.62rem; font-weight:800; text-transform:uppercase; letter-spacing:.5px; color:var(--blue);}
  .news .n-head{font-size:.88rem; font-weight:700; margin:3px 0 3px;}
  .news .n-sum{font-size:.8rem; color:var(--silver); line-height:1.5;}
  .news .n-foot{font-size:.7rem; color:var(--dim); margin-top:6px;}

  /* arena */
  .vs-grid{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
  .pf{border:1px solid var(--border-soft); border-radius:14px; padding:16px 18px;}
  .pf.you{border-color:var(--blue); box-shadow:0 0 0 1px var(--blue) inset;}
  .pf .pf-name{font-size:.9rem; font-weight:800; display:flex; align-items:center; gap:7px;}
  .pf .pf-ret{font-size:1.6rem; font-weight:800; margin:7px 0 1px; letter-spacing:-.5px;}
  .pf .pf-val{font-size:.76rem; color:var(--silver);}
  .dot{width:9px; height:9px; border-radius:50%;}
  .dot.b{background:var(--blue);} .dot.p{background:#7c4dff;}
  .pf-hold{display:flex; flex-wrap:wrap; gap:5px; margin-top:10px;}
  .pf-hold .h{background:var(--surface-2); border:1px solid var(--border-soft); border-radius:7px; padding:3px 8px; font-size:.72rem; font-weight:700;}
  .pf-hold .h span{font-weight:500; color:var(--silver);}
  .seg{display:inline-flex; background:var(--surface-2); border-radius:999px; padding:3px; gap:2px;}
  .seg button{border:none; background:none; padding:5px 14px; border-radius:999px; font-size:.76rem; font-weight:700; color:var(--silver); cursor:pointer;}
  .seg button.on{background:#fff; color:var(--text); box-shadow:0 1px 3px rgba(0,0,0,.08);}
  .move{border:1px solid var(--border-soft); border-radius:10px; padding:10px 13px; margin-bottom:8px;}
  .move .m-act{font-size:.82rem; font-weight:700;}
  .move .m-why{font-size:.78rem; color:var(--silver); margin-top:3px;}
  .jr{border-radius:10px; padding:10px 13px; margin-bottom:8px; font-size:.82rem;}
  .jr.good{background:var(--up-soft);} .jr.bad{background:var(--down-soft);}
  .jr .j-top{font-weight:700; display:flex; align-items:center; gap:7px;}
  .jr .j-top .who{font-size:.64rem; padding:1px 7px; border-radius:999px; background:rgba(0,0,0,.06); color:var(--silver);}
  .jr .j-txt{color:var(--silver); margin-top:3px; line-height:1.45;}

  /* thesis list */
  .th-row{display:flex; align-items:center; gap:12px; padding:13px 16px; border:1px solid var(--border-soft); border-radius:12px; margin-bottom:9px; cursor:pointer; transition:.12s;}
  .th-row:hover{border-color:#bfd0ff; background:var(--surface-2);}
  .th-row .th-cat{font-size:.6rem; font-weight:800; text-transform:uppercase; letter-spacing:.5px; color:var(--blue); background:var(--blue-soft); padding:3px 9px; border-radius:999px; flex-shrink:0;}
  .th-row .th-t{font-weight:700; font-size:.9rem;}
  .th-row .th-m{font-size:.72rem; color:var(--dim); margin-top:2px;}
  .th-row .go{margin-left:auto;}

  /* drawer */
  .dov{position:fixed; inset:0; background:rgba(10,11,13,.42); z-index:100; opacity:0; pointer-events:none; transition:opacity .2s;}
  .dov.open{opacity:1; pointer-events:auto;}
  .drawer{position:fixed; top:0; right:0; height:100%; width:440px; max-width:92vw; background:var(--bg);
    box-shadow:-8px 0 32px rgba(10,11,13,.14); transform:translateX(100%); transition:transform .22s ease;
    z-index:101; display:flex; flex-direction:column;}
  .dov.open .drawer{transform:translateX(0);}
  .dr-head{padding:18px 20px 14px; border-bottom:1px solid var(--border-soft); display:flex; justify-content:space-between; align-items:flex-start; gap:10px;}
  .dr-close{background:var(--surface-2); border:none; width:32px; height:32px; border-radius:999px; cursor:pointer; font-size:.9rem; color:var(--silver); flex-shrink:0;}
  .dr-close:hover{background:var(--surface-3);}
  .dr-body{padding:16px 20px 28px; overflow-y:auto;}
  .stat-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:6px;}
  .stat{background:var(--surface-2); border:1px solid var(--border-soft); border-radius:12px; padding:11px 14px;}
  .stat .k{font-size:.7rem; color:var(--silver); font-weight:600; margin-bottom:5px;}
  .stat .v{font-size:1.08rem; font-weight:800; font-variant-numeric:tabular-nums; letter-spacing:-.2px;}
  .dr-sec{font-size:.64rem; color:var(--silver); font-weight:700; text-transform:uppercase; letter-spacing:.8px; margin:18px 0 9px;}
  .trade{border-left:3px solid var(--blue); background:var(--blue-soft); border-radius:0 8px 8px 0; padding:9px 12px; margin-bottom:9px;}
  .trade .t-top{font-size:.78rem; font-weight:700;}
  .trade .t-why{font-size:.78rem; color:var(--silver); margin-top:3px; line-height:1.45;}

  /* accordion (เผื่อข้อมูลเยอะ) */
  .acc{border:1px solid var(--border-soft); border-radius:10px; margin-top:12px; overflow:hidden;}
  .acc>summary{list-style:none; cursor:pointer; display:flex; align-items:center; gap:8px;
    padding:12px 14px; font-size:.78rem; font-weight:700; letter-spacing:.2px;
    color:var(--text); background:var(--surface-2); user-select:none;}
  .acc>summary::-webkit-details-marker{display:none;}
  .acc>summary:hover{background:var(--surface-3);}
  .acc-count{background:var(--surface-3); color:var(--silver); border-radius:999px; padding:1px 8px; font-size:.66rem; letter-spacing:0; font-weight:700;}
  .acc-chev{margin-left:auto; transition:transform .18s; color:var(--dim); font-weight:800;}
  .acc[open] .acc-chev{transform:rotate(90deg);}
  .acc-body{padding:12px 14px 4px;}
  .acc-body .trade:last-child, .acc-body .news:last-child{margin-bottom:0;}

  /* log timeline */
  .log-item{display:flex; gap:14px; padding:13px 2px; border-bottom:1px solid var(--border-soft);}
  .log-item:last-child{border-bottom:none;}
  .log-date{width:96px; flex-shrink:0; font-size:.74rem; color:var(--dim); font-weight:600; padding-top:2px;}
  .log-main{flex:1; min-width:0;}
  .log-top{display:flex; align-items:center; gap:9px; flex-wrap:wrap;}
  .log-tk{font-weight:800; font-size:.92rem;}
  .log-act{font-size:.76rem; font-weight:700; padding:2px 10px; border-radius:999px;}
  .log-act.buy{background:var(--up-soft); color:var(--up);}
  .log-act.sell{background:var(--down-soft); color:var(--down);}
  .log-why{font-size:.8rem; color:var(--silver); line-height:1.5; margin-top:5px;}

  /* expand chart card */
  .chart-card{position:relative; display:flex; flex-direction:column;}
  .chart-card .ch-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:2px;}
  .chart-card .ch-head .ttl{font-size:.7rem; color:var(--silver); font-weight:700;}
  .chart-card .ch-head .exp{color:var(--dim); font-size:1rem; line-height:1;}

  /* portfolio balance card (line-charts-9 style) */
  .pf-card{padding:20px 22px; margin-top:22px;}
  .pf-lbl{font-size:.82rem; color:var(--silver); font-weight:600; margin-bottom:5px;}
  .pf-balrow{display:flex; align-items:baseline; gap:13px; flex-wrap:wrap;}
  .pf-bal{font-size:2.1rem; font-weight:800; letter-spacing:-1px; font-variant-numeric:tabular-nums;}
  .pf-chg{display:inline-flex; align-items:center; gap:7px; font-size:.85rem; font-weight:700;}
  .pf-chg-sub{color:var(--silver); font-weight:500;}
  .pf-sub2{font-size:.74rem; color:var(--dim); margin-top:4px;}
  .pf-stats{display:flex; justify-content:space-between; flex-wrap:wrap; gap:10px 18px; font-size:.78rem; color:var(--silver); margin:15px 0 4px;}
  .pf-stats b{font-weight:800; font-variant-numeric:tabular-nums;}
  .pf-stat-right{display:flex; gap:18px; flex-wrap:wrap;}
  .pf-hi{color:var(--blue);} .pf-lo{color:var(--blue);}
  .pf-seg{margin:6px 0 12px;}
  .pf-leg{display:flex; gap:18px; align-items:center; justify-content:center; margin:0 0 12px; font-size:.77rem; color:var(--silver); font-weight:600;}
  .pf-leg .it{display:inline-flex; align-items:center; gap:8px;}
  .pf-leg .sw{display:inline-block; width:20px; height:0; border-top:2.5px solid; border-radius:2px;}
  .pf-leg .sw.dash{border-top-style:dashed;}
  .pf-grid{position:relative; height:300px; border-radius:12px;
    background-image:radial-gradient(var(--border-soft) 1.1px, transparent 1.1px);
    background-size:19px 19px; background-position:-1px -1px;}

  /* center modal (allocation expanded) */
  .mov{position:fixed; inset:0; background:rgba(10,11,13,.5); z-index:110; display:none; align-items:center; justify-content:center; padding:18px;}
  .mov.open{display:flex;}
  .mbox{background:#fff; border:1px solid var(--border-soft); border-radius:16px; width:540px; max-width:95vw; max-height:90vh; overflow-y:auto; padding:20px 22px; box-shadow:0 16px 48px rgba(10,11,13,.2);}
  .mbox-head{display:flex; justify-content:space-between; align-items:flex-start; gap:10px; margin-bottom:16px; padding-bottom:14px; border-bottom:1px solid var(--border-soft);}
  .mbox-head .t{font-weight:800; font-size:1.05rem;}
  .alloc-chart{position:relative; height:300px; margin:4px 0 12px;}
  .alloc-list .a-row{display:flex; align-items:center; gap:10px; padding:9px 4px; border-top:1px solid var(--border-soft); font-size:.85rem;}
  .alloc-list .sw{width:11px; height:11px; border-radius:3px; flex-shrink:0;}
  .alloc-list .a-tk{font-weight:800; width:58px;}
  .alloc-list .a-nm{color:var(--silver); overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .alloc-list .a-w{margin-left:auto; font-weight:800; width:54px; text-align:right;}
  .alloc-list .a-v{color:var(--silver); width:96px; text-align:right; font-variant-numeric:tabular-nums;}

  @media(max-width:820px){
    .kpis{grid-template-columns:repeat(2,1fr);} .grid2{grid-template-columns:1fr;}
    .idx-grid{grid-template-columns:repeat(2,1fr);} .vs-grid{grid-template-columns:1fr;}
    .drawer{width:100%; max-width:100%;}
  }
</style>
</head>
<body>

<div class="topbar">
  <h1>Investment DashBroad</h1>
  <div class="tabs">
    <button class="tab-btn active" onclick="sw('overview',this)">Overview</button>
    <button class="tab-btn" onclick="sw('log',this)">Log</button>
    <button class="tab-btn" onclick="sw('market',this)">Market</button>
    <button class="tab-btn" onclick="sw('arena',this)">Arena</button>
    <button class="tab-btn" onclick="sw('thesis',this)">Thesis</button>
  </div>
  <span class="ts">อัพเดต: 10 มิ.ย. 08:30</span>
  <button class="btn-upd" onclick="alert('เดโม: ตอนใช้จริงปุ่มนี้สั่ง Jarvis ไปดึงราคา/ตลาด/ข่าว เดินเกม NOVA แล้วอัพเดต snapshot')">⟳ Update</button>
</div>
<div class="mockban">ตัวอย่าง (MOCKUP) — ข้อมูลสมมติ เพื่อดูหน้าตา/การใช้งานเมื่อข้อมูลเยอะ</div>

<div class="wrap">
  <div id="t-overview" class="tab-content active"></div>
  <div id="t-log" class="tab-content"></div>
  <div id="t-market" class="tab-content"></div>
  <div id="t-arena" class="tab-content"></div>
  <div id="t-thesis" class="tab-content"></div>
</div>

<!-- drawer -->
<div class="dov" id="dov" onclick="if(event.target===this)closeDrawer()">
  <aside class="drawer"><div id="drawer"></div></aside>
</div>

<!-- allocation expand modal -->
<div class="mov" id="mov" onclick="if(event.target===this)closeAlloc()">
  <div class="mbox" id="mbox"></div>
</div>

/* ---------- compute derived ---------- */
const H = DATA.holdings.map(h=>{
  const cost=h.shares*h.avg, val=h.shares*h.price, pl=val-cost, plpct=pl/cost*100, day=(h.price-h.prev)/h.prev*100;
  return {...h, cost, val, pl, plpct, day};
});
const TOTAL_VAL = H.reduce((s,h)=>s+h.val,0);
const TOTAL_COST = H.reduce((s,h)=>s+h.cost,0);
H.forEach(h=>h.weight=h.val/TOTAL_VAL*100);
const TOTAL_PL = TOTAL_VAL-TOTAL_COST, TOTAL_PLPCT = TOTAL_PL/TOTAL_COST*100;

/* ---------- helpers ---------- */
const thb = usd => '฿ '+Math.round(usd*FX).toLocaleString();
const pct = (v,d=1)=>`${v>=0?'+':''}${v.toFixed(d)}%`;
const cls = v => v>=0?'pos':'neg';
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const nl2br = s => esc(s).replace(/\n/g,'<br>');

/* ---------- table ---------- */
function rowHtml(h, showLog){
  return `<tr onclick="openHolding('${h.tk}',${!!showLog})">
    <td class="tk">${h.tk}<small>${esc(h.name)}</small></td>
    <td class="num">$${h.price.toFixed(2)}</td>
    <td class="num ${cls(h.day)}">${pct(h.day)}</td>
    <td class="num">$${Math.round(h.val).toLocaleString()}</td>
    <td class="num">${h.weight.toFixed(1)}%</td>
    <td class="num ${cls(h.pl)}">${pct(h.plpct)}</td>
    <td class="go">›</td>
  </tr>`;
}
function tableHtml(list, withSort, showLog){
  const cols=[['tk','หุ้น'],['price','ราคา'],['day','วันนี้'],['val','มูลค่า'],['weight','น้ำหนัก'],['plpct','P/L'],['','']];
  const head=cols.map(([k,l])=>{
    if(!l) return '<th></th>';
    const ar = withSort && sortKey===k ? (sortDir>0?' ▲':' ▼') : (withSort?' <span class="ar">⇅</span>':'');
    return `<th ${withSort?`onclick="setSort('${k}')"`:''}>${l}${ar}</th>`;
  }).join('');
  return `<div class="tbl-card"><table><thead><tr>${head}</tr></thead><tbody>${list.map(h=>rowHtml(h,showLog)).join('')}</tbody></table></div>`;
}

/* ---------- LOG ---------- */
let sortKey='weight', sortDir=-1; // ใช้โดย tableHtml (Overview) เท่านั้น
const THAI_M={'ม.ค.':0,'ก.พ.':1,'มี.ค.':2,'เม.ย.':3,'พ.ค.':4,'มิ.ย.':5,'ก.ค.':6,'ส.ค.':7,'ก.ย.':8,'ต.ค.':9,'พ.ย.':10,'ธ.ค.':11};
function thaiTs(s){ const p=String(s).trim().split(/\s+/); const d=+p[0]||1, m=THAI_M[p[1]]??0, y=+p[2]||2026; return new Date(y,m,d).getTime(); }
function renderLog(){
  const trades=H.flatMap(h=>h.trades.map(t=>({tk:h.tk,name:h.name,...t}))).sort((a,b)=>thaiTs(b.date)-thaiTs(a.date));
  const tl=trades.map(t=>{ const buy=t.t.includes('ซื้อ');
    return `<div class="log-item">
      <div class="log-date">${esc(t.date)}</div>
      <div class="log-main">
        <div class="log-top"><span class="log-tk">${t.tk}</span><span class="log-act ${buy?'buy':'sell'}">${esc(t.t)}</span></div>
        <div class="log-why">${esc(t.why)}</div>
      </div>
    </div>`; }).join('');
  const lessons=DATA.arena.journal.filter(j=>j.who==='You').map(j=>
    `<div class="jr ${j.good?'good':'bad'}"><div class="j-top">${esc(j.t)} <span class="who">${j.good?'บทเรียน':'จุดพลาด'}</span></div><div class="j-txt">${esc(j.x)}</div></div>`).join('');
  document.getElementById('t-log').innerHTML = `
    <div class="sec-title">ไทม์ไลน์การเทรด <span class="ts" style="text-transform:none;letter-spacing:0">${trades.length} รายการ</span></div>

}

      <div class="pf you"><div class="pf-name"><span class="dot b"></span>พอร์ตของคุณ</div><div class="pf-ret ${cls(a.you.ret)}">${pct(a.you.ret)}</div><div class="pf-val">$${a.you.val.toLocaleString()} · กำไร +$${(a.you.val-a.startVal).toLocaleString()} ตั้งแต่เริ่มเกม</div><div class="pf-hold">${pfHold(a.you)}</div></div>
      <div class="pf"><div class="pf-name"><span class="dot p"></span>NOVA (AI)</div><div class="pf-ret ${cls(a.nova.ret)}">${pct(a.nova.ret)}</div><div class="pf-val">$${a.nova.val.toLocaleString()} · กำไร +$${(a.nova.val-a.startVal).toLocaleString()} ตั้งแต่เริ่มเกม</div><div class="pf-hold">${pfHold(a.nova)}</div></div>
    </div>
    <div class="sec-title">เส้นผลตอบแทน (You vs NOVA vs S&P500)</div>
    <div class="card"><div class="chart-wrap"><canvas id="arenaLine"></canvas></div></div>
    <div class="sec-title">บันทึก <span class="seg"><button class="${arenaSeg==='moves'?'on':''}" onclick="setSeg('moves')">การเคลื่อนไหว NOVA</button><button class="${arenaSeg==='journal'?'on':''}" onclick="setSeg('journal')">Journal จุดเด่น/พลาด</button></span></div>
    <div class="feed">${arenaSeg==='moves'?moves:jr}</div>`;
  drawArena();
}
function setSeg(s){ arenaSeg=s; renderArena(); }

/* ---------- THESIS ---------- */
function renderThesis(){
  document.getElementById('t-thesis').innerHTML = `
    <div class="sec-title">Thesis ของคุณ — มุมมองเบื้องหลังการลงทุน</div>
    ${DATA.thesis.map((t,i)=>`<div class="th-row" onclick="openThesis(${i})"><span class="th-cat">${esc(t.cat)}</span><div><div class="th-t">${esc(t.t)}</div><div class="th-m">${esc(t.sum)}</div></div><span class="go">›</span></div>`).join('')}`;
}

/* ---------- DRAWER ---------- */
function openHolding(tk, showLog){
  const h=H.find(x=>x.tk===tk);
  const news=h.news.map(n=>`<div class="news"><div class="n-head">${esc(n.head)}</div><div class="n-foot">ที่มา: (mock) ${esc(n.src)} · ${esc(n.date)}</div></div>`).join('');
  const trades=h.trades.map(t=>`<div class="trade"><div class="t-top">${esc(t.t)} · ${esc(t.date)}</div><div class="t-why">${esc(t.why)}</div></div>`).join('');
  const logAcc = showLog ? `<details class="acc" open>
      <summary>ประวัติเทรด + เหตุผล <span class="acc-count">${h.trades.length}</span><span class="acc-chev">›</span></summary>
      <div class="acc-body">${trades}</div>
    </details>` : '';
  document.getElementById('mbox').innerHTML = `
    <div class="mbox-head">
      <div><div style="font-size:1.25rem;font-weight:800">${h.tk} <span style="font-weight:500;color:var(--dim);font-size:.8rem">${esc(h.name)}</span></div>
        <div style="margin-top:6px"><span class="chip ${cls(h.pl)}">${h.pl>=0?'▲':'▼'} ${pct(h.plpct)}</span> <span class="chip flat">${esc(h.sector)}</span></div></div>
      <button class="dr-close" onclick="closeAlloc()">✕</button>
    </div>
    <div class="stat-grid">
      <div class="stat"><div class="k">จำนวน</div><div class="v">${h.shares} หุ้น</div></div>
      <div class="stat"><div class="k">น้ำหนักพอร์ต</div><div class="v">${h.weight.toFixed(1)}%</div></div>
      <div class="stat"><div class="k">ทุนเฉลี่ย</div><div class="v">$${h.avg.toFixed(2)}</div></div>
      <div class="stat"><div class="k">ราคาปัจจุบัน</div><div class="v">$${h.price.toFixed(2)} <span class="${cls(h.day)}" style="font-size:.7rem">${pct(h.day)}</span></div></div>
      <div class="stat"><div class="k">มูลค่า</div><div class="v">$${h.val.toFixed(2)}</div></div>
      <div class="stat"><div class="k">กำไร/ขาดทุน</div><div class="v ${cls(h.pl)}">${h.pl>=0?'+$':'-$'}${Math.abs(h.pl).toFixed(2)}</div></div>
    </div>
    ${logAcc}
    <details class="acc" ${showLog?'':'open'}>
      <summary>ข่าวล่าสุดของตัวนี้ <span class="acc-count">${h.news.length}</span><span class="acc-chev">›</span></summary>
      <div class="acc-body">${news}</div>
    </details>`;
  document.getElementById('mov').classList.add('open');
}
function openThesis(i){
  const t=DATA.thesis[i];
  document.getElementById('drawer').innerHTML = `
    <div class="dr-head"><div><span class="th-cat">${esc(t.cat)}</span><div style="font-size:1.15rem;font-weight:800;margin-top:7px">${esc(t.t)}</div><div class="th-m" style="font-size:.72rem;color:var(--dim);margin-top:3px">อัปเดต ${esc(t.updated)}</div></div><button class="dr-close" onclick="closeDrawer()">✕</button></div>
    <div class="dr-body" style="font-size:.9rem;line-height:1.7;color:var(--text)">${nl2br(t.full)}</div>`;
  document.getElementById('dov').classList.add('open');
}
function closeDrawer(){ document.getElementById('dov').classList.remove('open'); }
document.addEventListener('keydown',e=>{ if(e.key==='Escape'){ closeDrawer(); closeAlloc(); } });

/* ---------- charts ---------- */
let benchSel=null;
function setBench(b){ benchSel=b; renderOverview(); }
// เส้นหลักเรืองแสง (เฉพาะ dataset 0)
const _pfGlow={id:'pfGlow',
  beforeDatasetDraw(c,a){ if(a.index!==0)return; const x=c.ctx; x.save();
    x.shadowColor='rgba(0,82,255,.40)'; x.shadowBlur=16; x.shadowOffsetX=0; x.shadowOffsetY=6; },
  afterDatasetDraw(c,a){ if(a.index!==0)return; c.ctx.restore(); }};
// เส้นประวิ่งตามเมาส์ (crosshair) ไปยังจุดที่ชี้
const _pfCursor={id:'pfCursor',
  afterDraw(c){ const t=c.tooltip; if(!t||!t._active||!t._active.length)return;
    const x=t._active[0].element.x, {ctx,chartArea}=c; ctx.save();
    ctx.strokeStyle='rgba(91,97,110,.55)'; ctx.lineWidth=1; ctx.setLineDash([3,3]);
    ctx.beginPath(); ctx.moveTo(x,chartArea.top); ctx.lineTo(x,chartArea.bottom); ctx.stroke();
    ctx.restore(); }};
function drawPortfolio(){
  const d=DATA.timeline, start=d[0].total, totals=d.map(x=>x.total);
  const hi=Math.max(...totals), lo=Math.min(...totals);
  // จุดโชว์เฉพาะ จุดล่าสุด + จุดสูงสุด/ต่ำสุด
  const dotR=c=>{const i=c.dataIndex,v=totals[i]; return (i===totals.length-1||v===hi||v===lo)?5:0;};
  const ds=[{label:'พอร์ตคุณ',data:totals,
      borderColor:'#0052ff',borderWidth:2.5,fill:false,tension:.4,
      pointRadius:dotR,pointHoverRadius:6,
      pointBackgroundColor:'#0052ff',pointBorderColor:'#fff',pointBorderWidth:2}];
  const vals=[...totals];
  if(benchSel){
    const series=DATA.bench[benchSel];
    const name=benchSel==='spx'?'S&P 500':'Nasdaq';
    const col='#8a919e';
    const bdata=series.map(p=>Math.round(start*(1+p/100)));
    vals.push(...bdata);
    ds.push({label:name,data:bdata,
      borderColor:col,borderDash:[5,4],fill:false,tension:.4,pointRadius:0,borderWidth:2});
  }
  const mn=Math.min(...vals), mx=Math.max(...vals), pd=Math.max((mx-mn)*0.28,300);
  new Chart(document.getElementById('portfolioLine'),{type:'line',
    data:{labels:d.map(x=>x.date),datasets:ds},
    plugins:[_pfGlow,_pfCursor],
    options:{responsive:true,maintainAspectRatio:false,
      layout:{padding:{top:10}},
      interaction:{mode:'index',intersect:false},
      plugins:{legend:{display:false},
        tooltip:{backgroundColor:'#fff',titleColor:'#8a919e',bodyColor:'#0a0b0d',footerColor:'#0a8a5a',
          borderColor:'#d7dae0',borderWidth:1,
          padding:{top:9,right:13,bottom:9,left:13},cornerRadius:11,displayColors:false,
          titleFont:{size:11,weight:'500'},bodyFont:{size:14,weight:'700'},footerFont:{size:11,weight:'700'},
          callbacks:{label:it=>`${it.dataset.label}  $${Math.round(it.raw).toLocaleString()}`,
            footer:its=>{if(benchSel)return'';const r=d[its[0].dataIndex];const s=r.change>=0?'+':'';
              return `${s}$${Math.round(r.change).toLocaleString()} วันนั้น`;}}}},
      scales:{
        x:{ticks:{color:'#5b616e',font:{size:11}},grid:{display:false},border:{display:false}},
        y:{min:Math.floor((mn-pd)/100)*100,max:Math.ceil((mx+pd)/100)*100,
          ticks:{color:'#8a919e',font:{size:10},maxTicksLimit:5,
            callback:v=>'$'+(v/1000).toFixed(1)+'k'},
          grid:{display:false},border:{display:false}}}}});
}

// ไล่เฉดฟ้าอ่อน→เข้มตามจำนวนหุ้น (เยอะแค่ไหนก็ไม่สีซ้ำ)
function blueScale(n){
  const a=[207,224,255], b=[0,67,214];
  return Array.from({length:n},(_,i)=>{ const t=n<=1?0.5:i/(n-1);
    const c=a.map((v,k)=>Math.round(v+(b[k]-v)*t)); return `rgb(${c[0]},${c[1]},${c[2]})`; });
}
const allocSorted=[...H].sort((a,b)=>b.val-a.val);
const allocColors=blueScale(allocSorted.length);
function drawDonut(){
  new Chart(document.getElementById('donut'),{type:'doughnut',
    data:{labels:allocSorted.map(h=>h.tk), datasets:[{data:allocSorted.map(h=>h.val), backgroundColor:allocColors, borderWidth:3, borderColor:'#fff'}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'66%',layout:{padding:{bottom:6}},plugins:{legend:{display:true,position:'bottom',labels:{color:'#5b616e',font:{size:10},padding:22,usePointStyle:true,pointStyle:'circle',boxWidth:7}}}}});
}
let allocChart=null;
function openAlloc(){
  const legend=allocSorted.map((h,i)=>`<div class="a-row"><span class="sw" style="background:${allocColors[i]}"></span><span class="a-tk">${h.tk}</span><span class="a-nm">${esc(h.name)}</span><span class="a-w">${h.weight.toFixed(1)}%</span><span class="a-v">$${Math.round(h.val).toLocaleString()}</span></div>`).join('');
  document.getElementById('mbox').innerHTML=`
    <div class="mbox-head"><span class="t">สัดส่วนพอร์ต · ${allocSorted.length} ตัว</span><button class="dr-close" onclick="closeAlloc()">✕</button></div>
    <div class="alloc-chart"><canvas id="allocCanvas"></canvas></div>
    <div class="alloc-list">${legend}</div>`;
  document.getElementById('mov').classList.add('open');
  if(allocChart) allocChart.destroy();
  allocChart=new Chart(document.getElementById('allocCanvas'),{type:'doughnut',
    data:{labels:allocSorted.map(h=>h.tk), datasets:[{data:allocSorted.map(h=>h.val), backgroundColor:allocColors, borderWidth:3, borderColor:'#fff'}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'58%',
      plugins:{legend:{display:false}, tooltip:{callbacks:{label:c=>` ${c.label}: ${c.parsed.toLocaleString(undefined,{maximumFractionDigits:0})} USD`}}}}});
}
function closeAlloc(){ document.getElementById('mov').classList.remove('open'); }
const lineOpts={responsive:true,maintainAspectRatio:false,
  plugins:{legend:{labels:{color:'#5b616e',font:{size:11},usePointStyle:true,pointStyle:'circle',boxWidth:7,padding:14}}},
  scales:{x:{ticks:{color:'#8a919e',font:{size:10}},grid:{display:false},border:{display:false}},
    y:{ticks:{color:'#8a919e',callback:v=>v+'%'},grid:{color:'#ebecf0'},border:{display:false}}}};
function drawArena(){
  const a=DATA.arena;
  new Chart(document.getElementById('arenaLine'),{type:'line',
    data:{labels:a.labels,datasets:[
      {label:'พอร์ตคุณ',data:a.you_s,borderColor:'#0052ff',backgroundColor:'rgba(0,82,255,.06)',fill:true,tension:.35,pointRadius:3},
      {label:'NOVA',data:a.nova_s,borderColor:'#7c4dff',fill:false,tension:.35,pointRadius:3},
      {label:'S&P500',data:a.spx_s,borderColor:'#8a919e',borderDash:[5,4],fill:false,tension:.35,pointRadius:0}]},
    options:lineOpts});
}

/* ---------- tabs ---------- */
const RENDER={overview:renderOverview,log:renderLog,market:renderMarket,arena:renderArena,thesis:renderThesis};
function sw(name,btn){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('t-'+name).classList.add('active');
  RENDER[name]();
}
renderOverview();
</script>
</body>
</html>
