<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Investment Dashboard — Mockup</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --blue:#0052ff; --blue-deep:#0043d6; --blue-soft:rgba(0,82,255,.08);
    --up:#098551; --up-soft:rgba(9,133,81,.12); --down:#cf202f; --down-soft:rgba(207,32,47,.10);
    --bg:#ffffff; --surface:#ffffff; --surface-2:#f5f6f8; --surface-3:#eef0f3;
    --text:#0a0b0d; --silver:#5b616e; --dim:#8a919e;
    --border:#d7dae0; --border-soft:#ebecf0;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{font-family:'Inter',system-ui,Arial,sans-serif; background:var(--bg); color:var(--text); -webkit-font-smoothing:antialiased;}
  .num{font-variant-numeric:tabular-nums;}
  .pos{color:var(--up);} .neg{color:var(--down);}

  .topbar{position:sticky; top:0; z-index:40; background:var(--bg); border-bottom:1px solid var(--border-soft);
    display:flex; align-items:center; gap:14px; padding:0 22px; height:58px;}
  .topbar h1{font-size:1.2rem; font-weight:800; color:var(--blue); white-space:nowrap;}
  .tabs{display:flex; gap:2px; flex:1; overflow-x:auto;}
  .tabs::-webkit-scrollbar{display:none;}
  .tab-btn{background:none; border:none; cursor:pointer; padding:6px 13px; border-radius:999px;
    font-size:.8125rem; font-weight:600; color:var(--silver); white-space:nowrap; transition:.15s;}
  .tab-btn:hover{color:var(--text); background:var(--surface-2);}
  .tab-btn.active{color:var(--text); background:var(--surface-3);}
  .btn-upd{background:var(--blue); color:#fff; border:none; border-radius:999px; padding:7px 13px;
    font-size:.73rem; font-weight:700; cursor:pointer; white-space:nowrap; flex-shrink:0;}
  .btn-upd:hover{background:var(--blue-deep);}
  .ts{font-size:.68rem; color:var(--dim); white-space:nowrap; flex-shrink:0;}

  .mockban{background:#fff8e6; border-bottom:1px solid #f0d98a; color:#9a6700; font-size:.73rem; text-align:center; padding:5px 12px; font-weight:600;}

  .wrap{max-width:1080px; margin:0 auto; padding:20px 16px 64px;}
  .tab-content{display:none;} .tab-content.active{display:block; animation:fade .18s ease;}
  @keyframes fade{from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:none;}}
  .sec-title{font-size:.66rem; color:var(--silver); font-weight:700; text-transform:uppercase; letter-spacing:1.1px; margin:22px 0 11px; display:flex; justify-content:space-between; align-items:center;}
  .sec-title:first-child{margin-top:0;}
  .link{color:var(--blue); font-size:.74rem; font-weight:700; cursor:pointer; text-transform:none; letter-spacing:0;}
  .link:hover{text-decoration:underline;}

  .card{background:var(--surface); border:1px solid var(--border-soft); border-radius:14px; padding:18px 20px;}

  /* KPI */
  .kpis{display:grid; grid-template-columns:repeat(4,1fr); gap:12px;}
  .kpi .lbl{font-size:.65rem; color:var(--silver); font-weight:700; text-transform:uppercase; letter-spacing:.9px; margin-bottom:7px;}
  .kpi .val{font-size:1.45rem; font-weight:800; letter-spacing:-.5px;}
  .kpi .sub{font-size:.76rem; margin-top:5px; color:var(--silver);}
  .chip{display:inline-flex; align-items:center; gap:3px; font-size:.7rem; font-weight:700; padding:2px 8px; border-radius:999px;}
  .chip.up{background:var(--up-soft); color:var(--up);} .chip.down{background:var(--down-soft); color:var(--down);} .chip.flat{background:var(--surface-3); color:var(--silver);}

  .grid2{display:grid; grid-template-columns:1.45fr 1fr; gap:12px;}
  .chart-wrap{position:relative; height:230px;}

  /* table */
  .tbl-card{background:var(--surface); border:1px solid var(--border-soft); border-radius:14px; overflow:hidden;}
  table{width:100%; border-collapse:collapse; font-size:.85rem;}
  thead th{font-size:.64rem; text-transform:uppercase; letter-spacing:.5px; color:var(--silver); font-weight:700;
    text-align:right; padding:12px 14px; background:var(--surface-2); white-space:nowrap; cursor:pointer; user-select:none;}
  thead th:first-child{text-align:left;}
  thead th .ar{opacity:.45; font-size:.7em;}
  tbody td{padding:12px 14px; border-top:1px solid var(--border-soft); text-align:right; white-space:nowrap;}
  tbody td:first-child{text-align:left;}
  tbody tr{cursor:pointer; transition:background .12s;}
  tbody tr:hover{background:var(--surface-2);}
  .tk{font-weight:800;} .tk small{display:block; font-weight:500; color:var(--dim); font-size:.7rem; margin-top:1px;}
  .go{color:var(--dim); font-weight:700;}

  /* toolbar */
  .toolbar{display:flex; gap:8px; align-items:center; margin-bottom:12px; flex-wrap:wrap;}
  .fchip{background:var(--surface-2); border:1px solid transparent; border-radius:999px; padding:6px 13px; font-size:.76rem; font-weight:600; color:var(--silver); cursor:pointer;}
  .fchip.on{border-color:var(--blue); color:var(--blue); background:var(--blue-soft);}
  .search{flex:1; min-width:130px; background:var(--surface-2); border:1px solid var(--border-soft); border-radius:999px; padding:8px 14px; font-size:.8rem; color:var(--text); font-family:inherit;}
  .search:focus{outline:none; border-color:var(--blue);}

  /* market */
  .idx-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:10px;}
  .idx{background:var(--surface-2); border-radius:12px; padding:13px 15px;}
  .idx .n{font-size:.7rem; color:var(--silver); font-weight:700;}
  .idx .p{font-size:1.12rem; font-weight:800; margin:3px 0 5px;}
  .sector{display:flex; align-items:center; gap:11px; padding:7px 0;}
  .sector .s-name{width:135px; font-size:.8rem; font-weight:600; flex-shrink:0;}
  .sector .s-bar{flex:1; height:7px; background:var(--surface-3); border-radius:999px; position:relative; overflow:hidden;}
  .sector .s-fill{position:absolute; top:0; height:100%; border-radius:999px;}
  .sector .s-val{width:52px; text-align:right; font-size:.78rem; font-weight:700; font-variant-numeric:tabular-nums;}

  .feed{max-height:420px; overflow-y:auto; padding-right:4px;}
  .feed::-webkit-scrollbar{width:6px;} .feed::-webkit-scrollbar-thumb{background:var(--border-soft); border-radius:3px;}
  .news{border:1px solid var(--border-soft); border-radius:11px; padding:12px 15px; margin-bottom:9px;}
  .news .n-tag{font-size:.62rem; font-weight:800; text-transform:uppercase; letter-spacing:.5px; color:var(--blue);}
  .news .n-head{font-size:.88rem; font-weight:700; margin:3px 0 3px;}
  .news .n-sum{font-size:.8rem; color:var(--silver); line-height:1.5;}
  .news .n-foot{font-size:.7rem; color:var(--dim); margin-top:6px;}

  /* arena */
  .vs-grid{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
  .pf{border:1px solid var(--border-soft); border-radius:14px; padding:16px 18px;}
  .pf.you{border-color:var(--blue); box-shadow:0 0 0 1px var(--blue) inset;}
  .pf .pf-name{font-size:.9rem; font-weight:800; display:flex; align-items:center; gap:7px;}
  .pf .pf-ret{font-size:1.6rem; font-weight:800; margin:7px 0 1px; letter-spacing:-.5px;}
  .pf .pf-val{font-size:.76rem; color:var(--silver);}
  .dot{width:9px; height:9px; border-radius:50%;}
  .dot.b{background:var(--blue);} .dot.p{background:#7c4dff;}
  .pf-hold{display:flex; flex-wrap:wrap; gap:5px; margin-top:10px;}
  .pf-hold .h{background:var(--surface-2); border:1px solid var(--border-soft); border-radius:7px; padding:3px 8px; font-size:.72rem; font-weight:700;}
  .pf-hold .h span{font-weight:500; color:var(--silver);}
  .seg{display:inline-flex; background:var(--surface-2); border-radius:999px; padding:3px; gap:2px;}
  .seg button{border:none; background:none; padding:5px 14px; border-radius:999px; font-size:.76rem; font-weight:700; color:var(--silver); cursor:pointer;}
  .seg button.on{background:#fff; color:var(--text); box-shadow:0 1px 3px rgba(0,0,0,.08);}
  .move{border:1px solid var(--border-soft); border-radius:10px; padding:10px 13px; margin-bottom:8px;}
  .move .m-act{font-size:.82rem; font-weight:700;}
  .move .m-why{font-size:.78rem; color:var(--silver); margin-top:3px;}
  .jr{border-radius:10px; padding:10px 13px; margin-bottom:8px; font-size:.82rem;}
  .jr.good{background:var(--up-soft);} .jr.bad{background:var(--down-soft);}
  .jr .j-top{font-weight:700; display:flex; align-items:center; gap:7px;}
  .jr .j-top .who{font-size:.64rem; padding:1px 7px; border-radius:999px; background:rgba(0,0,0,.06); color:var(--silver);}
  .jr .j-txt{color:var(--silver); margin-top:3px; line-height:1.45;}

  /* thesis list */
  .th-row{display:flex; align-items:center; gap:12px; padding:13px 16px; border:1px solid var(--border-soft); border-radius:12px; margin-bottom:9px; cursor:pointer; transition:.12s;}
  .th-row:hover{border-color:#bfd0ff; background:var(--surface-2);}
  .th-row .th-cat{font-size:.6rem; font-weight:800; text-transform:uppercase; letter-spacing:.5px; color:var(--blue); background:var(--blue-soft); padding:3px 9px; border-radius:999px; flex-shrink:0;}
  .th-row .th-t{font-weight:700; font-size:.9rem;}
  .th-row .th-m{font-size:.72rem; color:var(--dim); margin-top:2px;}
  .th-row .go{margin-left:auto;}

  /* drawer */
  .dov{position:fixed; inset:0; background:rgba(10,11,13,.42); z-index:100; opacity:0; pointer-events:none; transition:opacity .2s;}
  .dov.open{opacity:1; pointer-events:auto;}
  .drawer{position:fixed; top:0; right:0; height:100%; width:440px; max-width:92vw; background:var(--bg);
    box-shadow:-8px 0 32px rgba(10,11,13,.14); transform:translateX(100%); transition:transform .22s ease;
    z-index:101; display:flex; flex-direction:column;}
  .dov.open .drawer{transform:translateX(0);}
  .dr-head{padding:18px 20px 14px; border-bottom:1px solid var(--border-soft); display:flex; justify-content:space-between; align-items:flex-start; gap:10px;}
  .dr-close{background:var(--surface-2); border:none; width:32px; height:32px; border-radius:999px; cursor:pointer; font-size:.9rem; color:var(--silver); flex-shrink:0;}
  .dr-close:hover{background:var(--surface-3);}
  .dr-body{padding:16px 20px 28px; overflow-y:auto;}
  .stat-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:6px;}
  .stat{background:var(--surface-2); border-radius:10px; padding:10px 12px;}
  .stat .k{font-size:.66rem; color:var(--silver); font-weight:700; text-transform:uppercase; letter-spacing:.4px;}
  .stat .v{font-size:1rem; font-weight:800; margin-top:3px;}
  .dr-sec{font-size:.64rem; color:var(--silver); font-weight:700; text-transform:uppercase; letter-spacing:.8px; margin:18px 0 9px;}
  .trade{border-left:3px solid var(--blue); background:var(--blue-soft); border-radius:0 8px 8px 0; padding:9px 12px; margin-bottom:9px;}
  .trade .t-top{font-size:.78rem; font-weight:700;}
  .trade .t-why{font-size:.78rem; color:var(--silver); margin-top:3px; line-height:1.45;}

  /* expand chart card */
  .chart-card{cursor:pointer; position:relative;}
  .chart-card .ch-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:2px;}
  .chart-card .ch-head .ttl{font-size:.7rem; color:var(--silver); font-weight:700;}
  .chart-card .ch-head .exp{color:var(--dim); font-size:1rem; line-height:1;}
  .chart-card:hover{border-color:#bfd0ff;}

  /* center modal (allocation expanded) */
  .mov{position:fixed; inset:0; background:rgba(10,11,13,.5); z-index:110; display:none; align-items:center; justify-content:center; padding:18px;}
  .mov.open{display:flex;}
  .mbox{background:#fff; border:1px solid var(--border-soft); border-radius:16px; width:540px; max-width:95vw; max-height:90vh; overflow-y:auto; padding:20px 22px; box-shadow:0 16px 48px rgba(10,11,13,.2);}
  .mbox-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;}
  .mbox-head .t{font-weight:800; font-size:1.05rem;}
  .alloc-chart{position:relative; height:300px; margin:4px 0 12px;}
  .alloc-list .a-row{display:flex; align-items:center; gap:10px; padding:9px 4px; border-top:1px solid var(--border-soft); font-size:.85rem;}
  .alloc-list .sw{width:11px; height:11px; border-radius:3px; flex-shrink:0;}
  .alloc-list .a-tk{font-weight:800; width:58px;}
  .alloc-list .a-nm{color:var(--silver); overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .alloc-list .a-w{margin-left:auto; font-weight:800; width:54px; text-align:right;}
  .alloc-list .a-v{color:var(--silver); width:96px; text-align:right; font-variant-numeric:tabular-nums;}

  @media(max-width:820px){
    .kpis{grid-template-columns:repeat(2,1fr);} .grid2{grid-template-columns:1fr;}
    .idx-grid{grid-template-columns:repeat(2,1fr);} .vs-grid{grid-template-columns:1fr;}
    .drawer{width:100%; max-width:100%;}
  }
</style>
</head>

/* ---------- compute derived ---------- */
const H = DATA.holdings.map(h=>{
  const cost=h.shares*h.avg, val=h.shares*h.price, pl=val-cost, plpct=pl/cost*100, day=(h.price-h.prev)/h.prev*100;
  return {...h, cost, val, pl, plpct, day};
});
const TOTAL_VAL = H.reduce((s,h)=>s+h.val,0);
const TOTAL_COST = H.reduce((s,h)=>s+h.cost,0);
H.forEach(h=>h.weight=h.val/TOTAL_VAL*100);
const TOTAL_PL = TOTAL_VAL-TOTAL_COST, TOTAL_PLPCT = TOTAL_PL/TOTAL_COST*100;

/* ---------- helpers ---------- */
const thb = usd => '฿ '+Math.round(usd*FX).toLocaleString();
const pct = (v,d=1)=>`${v>=0?'+':''}${v.toFixed(d)}%`;
const cls = v => v>=0?'pos':'neg';
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const nl2br = s => esc(s).replace(/\n/g,'<br>');

/* ---------- table ---------- */
function rowHtml(h){
  return `<tr onclick="openHolding('${h.tk}')">
    <td class="tk">${h.tk}<small>${esc(h.name)}</small></td>
    <td class="num">$${h.price.toFixed(2)}</td>
    <td class="num ${cls(h.day)}">${pct(h.day)}</td>
    <td class="num">${thb(h.val)}</td>
    <td class="num">${h.weight.toFixed(1)}%</td>
    <td class="num ${cls(h.pl)}">${pct(h.plpct)}</td>
    <td class="go">›</td>
  </tr>`;
}
function tableHtml(list, withSort){
  const cols=[['tk','หุ้น'],['price','ราคา'],['day','วันนี้'],['val','มูลค่า'],['weight','น้ำหนัก'],['plpct','P/L'],['','']];
  const head=cols.map(([k,l])=>{
    if(!l) return '<th></th>';
    const ar = withSort && sortKey===k ? (sortDir>0?' ▲':' ▼') : (withSort?' <span class="ar">⇅</span>':'');
    return `<th ${withSort?`onclick="setSort('${k}')"`:''}>${l}${ar}</th>`;
  }).join('');
  return `<div class="tbl-card"><table><thead><tr>${head}</tr></thead><tbody>${list.map(rowHtml).join('')}</tbody></table></div>`;
}

let sortKey='weight', sortDir=-1, fFilter='all', fSearch='';
function setSort(k){ if(sortKey===k) sortDir*=-1; else {sortKey=k; sortDir=-1;} renderHoldings(); }
function setFilter(f){ fFilter=f; renderHoldings(); }
function onSearch(v){ fSearch=v.toLowerCase(); renderHoldings(); }
function renderHoldings(){
  let list=H.filter(h=>{
    if(fFilter==='gain'&&h.pl<0) return false;
    if(fFilter==='loss'&&h.pl>=0) return false;
    if(fSearch && !(h.tk.toLowerCase().includes(fSearch)||h.name.toLowerCase().includes(fSearch))) return false;
    return true;
  });
  list.sort((a,b)=>{ const av=a[sortKey], bv=b[sortKey];
    if(typeof av==='string') return av.localeCompare(bv)*sortDir; return (av-bv)*sortDir; });
  document.getElementById('t-holdings').innerHTML = `
    <div class="toolbar">
      <button class="fchip ${fFilter==='all'?'on':''}" onclick="setFilter('all')">ทั้งหมด</button>
      <button class="fchip ${fFilter==='gain'?'on':''}" onclick="setFilter('gain')">กำไร</button>
      <button class="fchip ${fFilter==='loss'?'on':''}" onclick="setFilter('loss')">ขาดทุน</button>
      <input class="search" placeholder="ค้นหา ticker/ชื่อ…" value="${fSearch}" oninput="onSearch(this.value)">
    </div>
    ${list.length? tableHtml(list,true) : '<div class="card" style="text-align:center;color:var(--silver)">ไม่พบหุ้น</div>'}
    <div class="ts" style="margin-top:10px">${list.length} ตัว · กดแถวเพื่อดูเทรด เหตุผล และข่าวรายตัว</div>`;
}

function blueScale(n){
  const a=[207,224,255], b=[0,67,214];
  return Array.from({length:n},(_,i)=>{ const t=n<=1?0.5:i/(n-1);
    const c=a.map((v,k)=>Math.round(v+(b[k]-v)*t)); return `rgb(${c[0]},${c[1]},${c[2]})`; });
}
const allocSorted=[...H].sort((a,b)=>b.val-a.val);
const allocColors=blueScale(allocSorted.length);
function drawDonut(){
  // legend ซ่อนเมื่อหุ้นเยอะ (กดขยายดู legend เต็มแทน)
  const showLegend = allocSorted.length<=6;
  new Chart(document.getElementById('donut'),{type:'doughnut',
    data:{labels:allocSorted.map(h=>h.tk), datasets:[{data:allocSorted.map(h=>h.val), backgroundColor:allocColors, borderWidth:3, borderColor:'#fff'}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'66%',plugins:{legend:{display:showLegend,position:'bottom',labels:{color:'#5b616e',font:{size:10},padding:8,usePointStyle:true,pointStyle:'circle',boxWidth:7}}}}});
}
let allocChart=null;
function openAlloc(){
  const legend=allocSorted.map((h,i)=>`<div class="a-row"><span class="sw" style="background:${allocColors[i]}"></span><span class="a-tk">${h.tk}</span><span class="a-nm">${esc(h.name)}</span><span class="a-w">${h.weight.toFixed(1)}%</span><span class="a-v">${thb(h.val)}</span></div>`).join('');
  document.getElementById('mbox').innerHTML=`
    <div class="mbox-head"><span class="t">สัดส่วนพอร์ต · ${allocSorted.length} ตัว</span><button class="dr-close" onclick="closeAlloc()">✕</button></div>
    <div class="alloc-chart"><canvas id="allocCanvas"></canvas></div>
    <div class="alloc-list">${legend}</div>`;
  document.getElementById('mov').classList.add('open');
  if(allocChart) allocChart.destroy();
  allocChart=new Chart(document.getElementById('allocCanvas'),{type:'doughnut',
    data:{labels:allocSorted.map(h=>h.tk), datasets:[{data:allocSorted.map(h=>h.val), backgroundColor:allocColors, borderWidth:3, borderColor:'#fff'}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'58%',
      plugins:{legend:{display:false}, tooltip:{callbacks:{label:c=>` ${c.label}: ${c.parsed.toLocaleString(undefined,{maximumFractionDigits:0})} USD`}}}}});
}
function closeAlloc(){ document.getElementById('mov').classList.remove('open'); }
const lineOpts={responsive:true,maintainAspectRatio:false,
  plugins:{legend:{labels:{color:'#5b616e',font:{size:11},usePointStyle:true,pointStyle:'circle',boxWidth:7,padding:14}}},
  scales:{x:{ticks:{color:'#8a919e',font:{size:10}},grid:{display:false},border:{display:false}},
    y:{ticks:{color:'#8a919e',callback:v=>v+'%'},grid:{color:'#ebecf0'},border:{display:false}}}};
function drawRet(){
  const a=DATA.arena;
  new Chart(document.getElementById('retLine'),{type:'line',
    data:{labels:a.labels,datasets:[
      {label:'พอร์ตคุณ',data:a.you_s,borderColor:'#0052ff',backgroundColor:'rgba(0,82,255,.08)',fill:true,tension:.35,pointRadius:3},
      {label:'S&P500',data:a.spx_s,borderColor:'#8a919e',borderDash:[5,4],fill:false,tension:.35,pointRadius:0}]},
    options:lineOpts});
}
function drawArena(){
  const a=DATA.arena;
  new Chart(document.getElementById('arenaLine'),{type:'line',
    data:{labels:a.labels,datasets:[
      {label:'พอร์ตคุณ',data:a.you_s,borderColor:'#0052ff',backgroundColor:'rgba(0,82,255,.06)',fill:true,tension:.35,pointRadius:3},
      {label:'NOVA',data:a.nova_s,borderColor:'#7c4dff',fill:false,tension:.35,pointRadius:3},
      {label:'S&P500',data:a.spx_s,borderColor:'#8a919e',borderDash:[5,4],fill:false,tension:.35,pointRadius:0}]},
    options:lineOpts});
}

/* ---------- tabs ---------- */
const RENDER={overview:renderOverview,holdings:renderHoldings,market:renderMarket,arena:renderArena,thesis:renderThesis};
function sw(name,btn){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('t-'+name).classList.add('active');
  RENDER[name]();
}
renderOverview();
</script>
