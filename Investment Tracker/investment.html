<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Investment Dashboard — Mockup</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="topbar">
  <h1>Investment DashBroad</h1>
  <div class="tabs">
    <button class="tab-btn active" onclick="sw('overview',this)">Overview</button>
    <button class="tab-btn" onclick="sw('company',this)">Company</button>
    <button class="tab-btn" onclick="sw('log',this)">Log</button>
    <button class="tab-btn" onclick="sw('market',this)">Market</button>
    <button class="tab-btn" onclick="sw('nova',this)">NOVA</button>
    <button class="tab-btn" onclick="sw('thesis',this)">Thesis</button>
  </div>
  <span class="ts">อัพเดต: 10 มิ.ย. 08:30</span>
  <button class="btn-upd" onclick="alert('เดโม: ตอนใช้จริงปุ่มนี้สั่ง Jarvis ไปดึงราคา/ตลาด/ข่าว เดินเกม NOVA แล้วอัพเดต snapshot')">⟳ Update</button>
</div>
<div class="mockban">ตัวอย่าง (MOCKUP) — ข้อมูลสมมติ เพื่อดูหน้าตา/การใช้งานเมื่อข้อมูลเยอะ</div>

<div class="wrap">
  <div id="t-overview" class="tab-content active"></div>
  <div id="t-company" class="tab-content"></div>
  <div id="t-log" class="tab-content"></div>
  <div id="t-market" class="tab-content"></div>
  <div id="t-nova" class="tab-content"></div>
  <div id="t-thesis" class="tab-content"></div>
</div>

<!-- drawer -->
<div class="dov" id="dov" onclick="if(event.target===this)closeDrawer()">
  <aside class="drawer"><div id="drawer"></div></aside>
</div>

<!-- allocation expand modal -->
<div class="mov" id="mov" onclick="if(event.target===this)closeAlloc()">
  <div class="mbox" id="mbox"></div>
</div>

<!-- data ก่อน logic เสมอ: data.js ประกาศ FX/DATA → app.js ใช้ต่อ -->
<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
