<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>มือซ้าย</title>
<link rel="manifest" href="./manifest.webmanifest">
<link rel="icon" type="image/png" href="../icons/lefthand-192.png">
<meta name="theme-color" content="#fbfaf8">
<link rel="apple-touch-icon" href="../icons/lefthand-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="มือซ้าย">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Cormorant+Garamond:wght@500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../app.css">
<link rel="stylesheet" href="../views/lefthand.css">
<link rel="stylesheet" href="../views/capture.css">
<style>
  :root{ --nav-h: 0px; }
  .scroll{ padding-bottom: calc(112px + env(safe-area-inset-bottom)); }
  .install-bar{ bottom: calc(150px + env(safe-area-inset-bottom)); }
</style>
</head>
<body>

<div class="scroll">
  <div class="app-head">
    <div class="app-head-in">
      <div class="app-title">
        <svg class="spike" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 11V7a2 2 0 0 0-4 0v3"/><path d="M14 10V5a2 2 0 0 0-4 0v6"/><path d="M10 10.5V6a2 2 0 0 0-4 0v9"/><path d="M6 14v-2a2 2 0 0 0-4 0v3a8 8 0 0 0 8 8h2a8 8 0 0 0 8-8v-3a2 2 0 0 0-4 0v1"/></svg>
        <span>มือซ้าย</span>
      </div>
      <div class="app-head-slot" id="appHeadSlot"></div>
    </div>
  </div>
  <div class="view active" id="view-root"></div>
</div>

<div class="install-bar" id="installBar">
  <div class="install-txt">ติดตั้งเป็นแอป — เต็มจอ ไม่มีแถบเบราว์เซอร์</div>
  <button class="install-btn" id="installBtn">ติดตั้ง</button>
  <button class="install-x" id="installX" aria-label="Close">&#10005;</button>
</div>

<button class="fab" id="fab" aria-label="Quick capture">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
  <span class="fab-badge" id="fabBadge"></span>
</button>
<div class="overlay" id="capOverlay">
  <div class="modal">
    <div class="sheet-handle"></div>
    <div class="modal-head">
      <div><div class="modal-title">จดเร็ว</div><div class="modal-sub">เก็บไว้ในเครื่อง — Jarvis จะเอาไปจัดให้ทีหลัง</div></div>
      <button class="modal-close" id="capClose"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg></button>
    </div>
    <div class="modal-body">
      <div class="cap-types" id="capTypes"></div>
      <div class="cap-input-row">
        <input id="capText" placeholder="จดอะไรสักอย่าง... เช่น วันนี้ฝึกเขียนหนังสือ" autocomplete="off">
        <input id="capAmount" class="cap-amt" placeholder="นาที" inputmode="decimal" autocomplete="off">
      </div>
      <button class="cap-add" id="capAdd">เพิ่มเข้ากล่อง</button>
      <div class="cap-list-head" id="capListHead"></div>
      <div class="cap-list" id="capList"></div>
      <div class="cap-actions" id="capActions"></div>
    </div>
  </div>
</div>

<script>window.APP_VIEW = 'lefthand';</script>
<script src="../data/lefthand.data.js"></script>
<script src="../views/lefthand.js"></script>
<script src="../shared/boot.js"></script>
<script src="../views/capture.js"></script>
</body>
</html>
