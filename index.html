<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Dashboard</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%230052FF'/%3E%3Ccircle cx='16' cy='16' r='9' fill='%23ffffff'/%3E%3Crect x='12.4' y='12.4' width='7.2' height='7.2' rx='1.6' fill='%230052FF'/%3E%3C/svg%3E">

<!-- PWA -->
<link rel="manifest" href="./manifest.webmanifest">
<meta name="theme-color" content="#ffffff">
<link rel="apple-touch-icon" href="./icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Dashboard">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { overscroll-behavior: none; }
body {
  font-family: 'Inter', system-ui, sans-serif; background: #ffffff; color: #0a0b0d;
  height: 100vh; height: 100dvh; display: flex; overflow: hidden;
  -webkit-user-select: none; user-select: none;
  -webkit-touch-callout: none;
}

/* Sidebar (desktop) */
.sidebar {
  width: 220px; min-width: 220px; background: #ffffff;
  border-right: 1px solid #ebecf0;
  display: flex; flex-direction: column;
  transition: width 0.2s ease, min-width 0.2s ease;
  overflow: hidden;
}
.sidebar.collapsed { width: 52px; min-width: 52px; }

.sidebar-header {
  height: 60px; display: flex; align-items: center; gap: 12px;
  padding: 0 14px; border-bottom: 1px solid #ebecf0; flex-shrink: 0;
}
.ham-btn {
  background: none; border: none; cursor: pointer;
  width: 28px; height: 28px; flex-shrink: 0;
  display: flex; flex-direction: column; justify-content: center; gap: 5px;
  padding: 4px;
}
.ham-btn span { display: block; width: 20px; height: 2px; background: #5b616e; border-radius: 2px; transition: background 0.15s; }
.ham-btn:hover span { background: #0a0b0d; }
.sidebar-title {
  font-size: 0.9375rem; font-weight: 700; color: #0a0b0d;
  white-space: nowrap; overflow: hidden;
  transition: opacity 0.15s;
}
.sidebar.collapsed .sidebar-title { opacity: 0; pointer-events: none; }

.nav-list { padding: 12px 8px; display: flex; flex-direction: column; gap: 4px; }
.nav-item {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 10px; border-radius: 8px; cursor: pointer;
  background: none; border: none; color: #5b616e;
  font-size: 0.875rem; font-weight: 500; text-align: left;
  width: 100%; white-space: nowrap; overflow: hidden;
  transition: background 0.15s, color 0.15s;
}
.nav-item:hover { background: #f5f6f8; color: #0a0b0d; }
.nav-item.active { background: rgba(0,82,255,0.08); color: #0052ff; font-weight: 600; }
.nav-icon { font-size: 1.1rem; flex-shrink: 0; width: 20px; text-align: center; }
.nav-label { overflow: hidden; transition: opacity 0.15s; }
.sidebar.collapsed .nav-label { opacity: 0; pointer-events: none; }

/* Main */
.main { flex: 1; overflow: hidden; position: relative; display: flex; flex-direction: column; }
iframe { width: 100%; height: 100%; border: none; display: none; flex: 1; }
iframe.active { display: block; }

/* Mobile-only chrome (hidden on desktop) */
.topbar { display: none; }
.bottomnav { display: none; }

/* Mobile overlay (desktop unused) */
.backdrop {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.6); z-index: 10;
}
.backdrop.show { display: block; }

@media (max-width: 768px) {
  body { flex-direction: column; }

  /* Drawer/sidebar not used on mobile — replaced by bottom tab bar */
  .sidebar, .backdrop { display: none !important; }

  /* Top title bar */
  .topbar {
    display: flex; align-items: center; gap: 10px;
    height: calc(50px + env(safe-area-inset-top));
    padding: env(safe-area-inset-top) 16px 0;
    background: #ffffff; border-bottom: 1px solid #ebecf0;
    flex-shrink: 0;
  }
  .topbar-logo {
    width: 24px; height: 24px; border-radius: 6px; flex-shrink: 0;
  }
  .topbar-title { font-size: 1.0625rem; font-weight: 700; color: #0a0b0d; letter-spacing: -0.01em; }

  /* iframe area fills the middle */
  .main { flex: 1; min-height: 0; }
  iframe { height: 100%; }

  /* Bottom tab bar */
  .bottomnav {
    display: flex; flex-shrink: 0;
    background: rgba(255,255,255,0.92);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    backdrop-filter: saturate(180%) blur(20px);
    border-top: 1px solid #ebecf0;
    padding-bottom: env(safe-area-inset-bottom);
  }
  .tab {
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 3px; padding: 8px 4px 6px;
    background: none; border: none; cursor: pointer;
    color: #8a909e; font-family: inherit;
    transition: color 0.15s;
  }
  .tab svg { width: 23px; height: 23px; }
  .tab-label { font-size: 0.625rem; font-weight: 600; letter-spacing: 0.01em; }
  .tab.active { color: #0052ff; }
  .tab:active { opacity: 0.55; }
}

@media (min-width: 769px) {
  .topbar, .bottomnav { display: none !important; }
}
</style>
</head>
<body>

<div class="backdrop" id="backdrop" onclick="closeSidebar()"></div>

<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <button class="ham-btn" onclick="toggleSidebar()">
      <span></span><span></span><span></span>
    </button>
    <span class="sidebar-title">Dashboard</span>
  </div>
  <div class="nav-list">
    <button class="nav-item active" data-tab="money" onclick="switchTo('money')">
      <span class="nav-icon"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle"><path d="M3 7V5.5A1.5 1.5 0 0 1 4.5 4H16a1.5 1.5 0 0 1 1.5 1.5V7"/><path d="M3 7h16.5A1.5 1.5 0 0 1 21 8.5v9A1.5 1.5 0 0 1 19.5 19h-15A1.5 1.5 0 0 1 3 17.5V7z"/><circle cx="16.5" cy="13" r="1.15" fill="currentColor" stroke="none"/></svg></span>
      <span class="nav-label">Money Tracker</span>
    </button>
    <button class="nav-item" data-tab="planner" onclick="switchTo('planner')">
      <span class="nav-icon"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle"><rect x="3" y="4.5" width="18" height="16.5" rx="2"/><path d="M3 9.5h18M8 2.5v4M16 2.5v4"/></svg></span>
      <span class="nav-label">Planner Tracker</span>
    </button>
    <button class="nav-item" data-tab="investment" onclick="switchTo('investment')">
      <span class="nav-icon"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle"><path d="M3 17l5-5 4 4 7-7"/><path d="M16 6h5v5"/></svg></span>
      <span class="nav-label">Investment Tracker</span>
    </button>
  </div>
</div>

<div class="topbar">
  <img class="topbar-logo" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%230052FF'/%3E%3Ccircle cx='16' cy='16' r='9' fill='%23ffffff'/%3E%3Crect x='12.4' y='12.4' width='7.2' height='7.2' rx='1.6' fill='%230052FF'/%3E%3C/svg%3E" alt="">
  <span class="topbar-title" id="topbarTitle">Money</span>
</div>

<div class="main">
  <iframe id="frame-money"  src="Money Tracker/index.html"       class="active"></iframe>
  <iframe id="frame-planner" src="Planner Tracker/planner.html"></iframe>
  <iframe id="frame-investment" src="Investment Tracker/investment.html"></iframe>
</div>

<nav class="bottomnav">
  <button class="tab active" data-tab="money" onclick="switchTo('money')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7V5.5A1.5 1.5 0 0 1 4.5 4H16a1.5 1.5 0 0 1 1.5 1.5V7"/><path d="M3 7h16.5A1.5 1.5 0 0 1 21 8.5v9A1.5 1.5 0 0 1 19.5 19h-15A1.5 1.5 0 0 1 3 17.5V7z"/><circle cx="16.5" cy="13" r="1.15" fill="currentColor" stroke="none"/></svg>
    <span class="tab-label">Money</span>
  </button>
  <button class="tab" data-tab="planner" onclick="switchTo('planner')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4.5" width="18" height="16.5" rx="2"/><path d="M3 9.5h18M8 2.5v4M16 2.5v4"/></svg>
    <span class="tab-label">Planner</span>
  </button>
  <button class="tab" data-tab="investment" onclick="switchTo('investment')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 17l5-5 4 4 7-7"/><path d="M16 6h5v5"/></svg>
    <span class="tab-label">Invest</span>
  </button>
</nav>

<script>
const isMobile = () => window.innerWidth <= 768;
const TITLES = { money: 'Money', planner: 'Planner', investment: 'Investment' };

function toggleSidebar() {
  const sb = document.getElementById('sidebar');
  const bd = document.getElementById('backdrop');
  if (isMobile()) {
    const open = sb.classList.toggle('mobile-open');
    bd.classList.toggle('show', open);
  } else {
    sb.classList.toggle('collapsed');
  }
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('mobile-open');
  document.getElementById('backdrop').classList.remove('show');
}

function switchTo(name) {
  document.querySelectorAll('[data-tab]').forEach(b =>
    b.classList.toggle('active', b.dataset.tab === name));
  document.querySelectorAll('iframe').forEach(f => f.classList.remove('active'));
  document.getElementById('frame-' + name).classList.add('active');
  document.getElementById('topbarTitle').textContent = TITLES[name] || '';
}

// PWA — register service worker (offline + installable)
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
