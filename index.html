<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Money Tracker Dashboard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f0f0f; color: #e0e0e0; min-height: 100vh; padding: 20px; }
  h1 { text-align: center; font-size: 1.6rem; color: #fff; margin-bottom: 4px; }
  .updated { display: block; text-align: center; font-size: 0.78rem; color: #666; margin-bottom: 20px; }
  .month-tabs { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-bottom: 20px; }
  .tab { padding: 6px 16px; border-radius: 20px; border: 1px solid #333; background: #1a1a1a; color: #999; cursor: pointer; font-size: 0.85rem; transition: all 0.2s; }
  .tab.active { background: #2563eb; border-color: #2563eb; color: #fff; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; max-width: 1100px; margin: 0 auto; }
  .card { background: #1a1a1a; border-radius: 12px; padding: 18px; border: 1px solid #2a2a2a; }
  .card h2 { font-size: 0.85rem; color: #888; margin-bottom: 14px; text-transform: uppercase; letter-spacing: 0.05em; }
  .stat { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
  .stat-label { font-size: 0.9rem; color: #aaa; }
  .stat-value { font-size: 1.05rem; font-weight: 600; }
  .income { color: #4ade80; }
  .expense { color: #f87171; }
  .net-pos { color: #4ade80; }
  .net-neg { color: #f87171; }
  .bar-row { margin-bottom: 10px; }
  .bar-label { display: flex; justify-content: space-between; font-size: 0.8rem; color: #aaa; margin-bottom: 3px; }
  .bar-track { height: 6px; background: #2a2a2a; border-radius: 3px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 3px; transition: width 0.4s; }
  .bar-ok { background: #2563eb; }
  .bar-warn { background: #f59e0b; }
  .bar-over { background: #ef4444; }
  .bar-zero { background: #3a3a3a; }
  .txn-list { max-height: 320px; overflow-y: auto; }
  .txn { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid #222; font-size: 0.83rem; }
  .txn:last-child { border-bottom: none; }
  .txn-name { color: #ccc; flex: 1; }
  .txn-cat { font-size: 0.72rem; color: #666; margin-left: 6px; }
  .txn-date { color: #666; font-size: 0.75rem; margin-left: 8px; }
  .txn-amt { font-weight: 600; color: #f87171; margin-left: 10px; }
  .txn-amt.inc { color: #4ade80; }
  .summary-net { text-align: center; padding: 10px; border-radius: 8px; margin-top: 10px; font-size: 1.1rem; font-weight: 700; }
  .summary-net.pos { background: #052e16; color: #4ade80; }
  .summary-net.neg { background: #2d0a0a; color: #f87171; }
</style>
</head>
<body>
<h1>Money Tracker</h1>
<span class="updated">อัพเดตล่าสุด: 06/06/2026 00:05</span>

<div class="month-tabs" id="tabs"></div>
<div class="grid" id="content"></div>

<script>
const ALL_DATA = {
  "2026-06": {
    "budget": {
      "Restaurant": 3000,
      "Family": 3000,
      "Subscriptions": 2000,
      "Rent": 1500,
      "Investment": 1000,
      "Shopping": 500,
      "Beauty": 0,
      "Books": 500,
      "Entertainment": 0,
      "Study": 0,
      "Transport": 0,
      "Emergency": 0
    },
    "income": [
      {"date":"2026-06-01","amount":12880,"source":"Salary","name":"เงินเดือน","notes":""},
      {"date":"2026-06-01","amount":3000,"source":"Other","name":"ป้าเอื้อมให้เงิน","notes":""}
    ],
    "expenses": [
      {"date":"2026-06-01","amount":762,"category":"Subscriptions","name":"Adobe","notes":""},
      {"date":"2026-06-01","amount":79,"category":"Subscriptions","name":"Spotify","notes":""},
      {"date":"2026-06-01","amount":59,"category":"Restaurant","name":"กระเพราไส้กรอก","notes":""},
      {"date":"2026-06-01","amount":10,"category":"Restaurant","name":"น้ำเปล่า","notes":""},
      {"date":"2026-06-01","amount":65,"category":"Restaurant","name":"กาแฟพันธุ์ไทย","notes":""},
      {"date":"2026-06-01","amount":50,"category":"Restaurant","name":"ยำมาม่า","notes":""},
      {"date":"2026-06-01","amount":10,"category":"Restaurant","name":"ข้าวเปล่า","notes":""},
      {"date":"2026-06-01","amount":1500,"category":"Rent","name":"Rent","notes":""},
      {"date":"2026-06-01","amount":424,"category":"Subscriptions","name":"Internet","notes":""},
      {"date":"2026-06-01","amount":6500,"category":"Family","name":"ให้ Family","notes":""},
      {"date":"2026-06-02","amount":79,"category":"Restaurant","name":"ไก่ย่างห้าดาว","notes":""},
      {"date":"2026-06-02","amount":176,"category":"Shopping","name":"โคมไฟหัวเตียง","notes":""},
      {"date":"2026-06-02","amount":50,"category":"Restaurant","name":"บะหมี่เกี๊ยวแห้ง","notes":""},
      {"date":"2026-06-03","amount":25,"category":"Restaurant","name":"ข้าวเหนียวไก่ลาบ","notes":""},
      {"date":"2026-06-03","amount":25,"category":"Restaurant","name":"ข้าวเหนียวไก่เกาหลี","notes":""},
      {"date":"2026-06-03","amount":189,"category":"Shopping","name":"กระเป๋า Yuedpao","notes":""},
      {"date":"2026-06-03","amount":250,"category":"Subscriptions","name":"บัตรเดบิต","notes":"annual"},
      {"date":"2026-06-03","amount":193,"category":"Books","name":"หนังสือไนปุรานเริกส์","notes":""},
      {"date":"2026-06-03","amount":193,"category":"Books","name":"หนังสือหนึ่งนับวันนิรันดร","notes":""},
      {"date":"2026-06-03","amount":51,"category":"Books","name":"ค่าส่งหนังสือ","notes":""},
      {"date":"2026-06-03","amount":40,"category":"Restaurant","name":"น้ำตก","notes":""},
      {"date":"2026-06-03","amount":10,"category":"Restaurant","name":"ข้าวเหนียว","notes":""},
      {"date":"2026-06-04","amount":40,"category":"Restaurant","name":"ข้าวหมกไก่","notes":""},
      {"date":"2026-06-04","amount":40,"category":"Restaurant","name":"น้ำตก","notes":""},
      {"date":"2026-06-04","amount":10,"category":"Restaurant","name":"ข้าวเหนียว","notes":""},
      {"date":"2026-06-05","amount":40,"category":"Restaurant","name":"น้ำตก","notes":""},
      {"date":"2026-06-05","amount":10,"category":"Restaurant","name":"ข้าวเหนียว","notes":""},
      {"date":"2026-06-05","amount":25,"category":"Restaurant","name":"ชาเขียว","notes":""},
      {"date":"2026-06-05","amount":40,"category":"Restaurant","name":"ไส้กรอกทอด","notes":""},
      {"date":"2026-06-05","amount":15,"category":"Restaurant","name":"ข้าวสวยหอมมะลิ","notes":""}
    ]
  }
};

const KEYS = ["2026-06"];

const MONTH_NAMES = {
  "01":"ม.ค.","02":"ก.พ.","03":"มี.ค.","04":"เม.ย.",
  "05":"พ.ค.","06":"มิ.ย.","07":"ก.ค.","08":"ส.ค.",
  "09":"ก.ย.","10":"ต.ค.","11":"พ.ย.","12":"ธ.ค."
};

function fmtKey(k) {
  const [y, m] = k.split("-");
  return MONTH_NAMES[m] + " " + y;
}

function fmt(n) { return "฿" + n.toLocaleString(); }

let currentKey = KEYS[KEYS.length - 1];

function buildTabs() {
  const el = document.getElementById("tabs");
  el.innerHTML = KEYS.map(k =>
    `<div class="tab${k===currentKey?' active':''}" onclick="switchTab('${k}')">${fmtKey(k)}</div>`
  ).join("");
}

function switchTab(k) { currentKey = k; buildTabs(); render(); }

function render() {
  const data = ALL_DATA[currentKey];
  if (!data) return;

  const totalIncome = data.income.reduce((s,r)=>s+r.amount,0);
  const totalExpense = data.expenses.reduce((s,r)=>s+r.amount,0);
  const net = totalIncome - totalExpense;

  const catTotals = {};
  data.expenses.forEach(e => { catTotals[e.category] = (catTotals[e.category]||0) + e.amount; });

  const budgetCats = Object.keys(data.budget);

  const sortedExp = [...data.expenses].sort((a,b)=>b.date.localeCompare(a.date));
  const sortedInc = [...data.income].sort((a,b)=>b.date.localeCompare(a.date));

  const netClass = net >= 0 ? "pos" : "neg";
  const netColor = net >= 0 ? "net-pos" : "net-neg";

  document.getElementById("content").innerHTML = `
    <div class="card">
      <h2>ภาพรวม ${fmtKey(currentKey)}</h2>
      <div class="stat"><span class="stat-label">รายรับ</span><span class="stat-value income">${fmt(totalIncome)}</span></div>
      <div class="stat"><span class="stat-label">รายจ่าย</span><span class="stat-value expense">${fmt(totalExpense)}</span></div>
      <div class="summary-net ${netClass}">คงเหลือ ${fmt(net)}</div>
    </div>

    <div class="card">
      <h2>งบประมาณ vs ใช้จริง</h2>
      ${budgetCats.map(cat => {
        const spent = catTotals[cat] || 0;
        const budget = data.budget[cat];
        if (budget === 0 && spent === 0) return "";
        const pct = budget > 0 ? Math.min((spent/budget)*100, 100) : 100;
        const barClass = budget === 0 ? "bar-over" : pct >= 100 ? "bar-over" : pct >= 80 ? "bar-warn" : "bar-ok";
        const overText = spent > budget && budget > 0 ? ` <span style="color:#ef4444;font-size:0.72rem">เกิน!</span>` : "";
        return `<div class="bar-row">
          <div class="bar-label">
            <span>${cat}${overText}</span>
            <span>${fmt(spent)} / ${budget>0?fmt(budget):"ไม่กำหนด"}</span>
          </div>
          <div class="bar-track"><div class="bar-fill ${barClass}" style="width:${pct}%"></div></div>
        </div>`;
      }).join("")}
    </div>

    <div class="card">
      <h2>รายจ่ายล่าสุด (${data.expenses.length} รายการ)</h2>
      <div class="txn-list">
        ${sortedExp.map(e=>`
          <div class="txn">
            <span class="txn-name">${e.name}<span class="txn-cat">${e.category}</span></span>
            <span class="txn-date">${e.date.slice(5).replace("-","/")}</span>
            <span class="txn-amt">${fmt(e.amount)}</span>
          </div>`).join("")}
      </div>
    </div>

    <div class="card">
      <h2>รายรับ (${data.income.length} รายการ)</h2>
      <div class="txn-list">
        ${sortedInc.map(i=>`
          <div class="txn">
            <span class="txn-name">${i.name}<span class="txn-cat">${i.source}</span></span>
            <span class="txn-date">${i.date.slice(5).replace("-","/")}</span>
            <span class="txn-amt inc">${fmt(i.amount)}</span>
          </div>`).join("")}
      </div>
    </div>
  `;
}

buildTabs();
render();
</script>
</body>
</html>
