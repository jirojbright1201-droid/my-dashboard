<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', system-ui, sans-serif; background: #121212; color: #fff; height: 100vh; display: flex; overflow: hidden; }

/* Sidebar */
.sidebar {
  width: 220px; min-width: 220px; background: #181818;
  border-right: 1px solid #2a2a2a;
  display: flex; flex-direction: column;
  transition: width 0.2s ease, min-width 0.2s ease;
  overflow: hidden;
}
.sidebar.collapsed { width: 52px; min-width: 52px; }

.sidebar-header {
  height: 60px; display: flex; align-items: center; gap: 12px;
  padding: 0 14px; border-bottom: 1px solid #2a2a2a; flex-shrink: 0;
}
.ham-btn {
  background: none; border: none; cursor: pointer;
  width: 28px; height: 28px; flex-shrink: 0;
  display: flex; flex-direction: column; justify-content: center; gap: 5px;
  padding: 4px;
}
.ham-btn span { display: block; width: 20px; height: 2px; background: #b3b3b3; border-radius: 2px; transition: background 0.15s; }
.ham-btn:hover span { background: #fff; }
.sidebar-title {
  font-size: 0.9375rem; font-weight: 700; color: #fff;
  white-space: nowrap; overflow: hidden;
  transition: opacity 0.15s;
}
.sidebar.collapsed .sidebar-title { opacity: 0; pointer-events: none; }

.nav-list { padding: 12px 8px; display: flex; flex-direction: column; gap: 4px; }
.nav-item {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 10px; border-radius: 8px; cursor: pointer;
  background: none; border: none; color: #b3b3b3;
  font-size: 0.875rem; font-weight: 500; text-align: left;
  width: 100%; white-space: nowrap; overflow: hidden;
  transition: background 0.15s, color 0.15s;
}
.nav-item:hover { background: #1f1f1f; color: #fff; }
.nav-item.active { background: #282828; color: #fff; }
.nav-icon { font-size: 1.1rem; flex-shrink: 0; width: 20px; text-align: center; }
.nav-label { overflow: hidden; transition: opacity 0.15s; }
.sidebar.collapsed .nav-label { opacity: 0; pointer-events: none; }

/* Main */
.main { flex: 1; overflow: hidden; }
iframe {
  width: 100%; height: 100%;
  border: none; display: none;
}
iframe.active { display: block; }
</style>
</head>
<body>

<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <button class="ham-btn" onclick="toggleSidebar()">
      <span></span><span></span><span></span>
    </button>
    <span class="sidebar-title">Dashboard</span>
  </div>
  <div class="nav-list">
    <button class="nav-item active" onclick="switchTo('money', this)">
      <span class="nav-icon">💰</span>
      <span class="nav-label">Money Tracker</span>
    </button>
    <button class="nav-item" onclick="switchTo('planner', this)">
      <span class="nav-icon">📅</span>
      <span class="nav-label">Planner</span>
    </button>
  </div>
</div>

<div class="main">
  <iframe id="frame-money"  src="Money Tracker/index.html"       class="active"></iframe>
  <iframe id="frame-planner" src="Planner Tracker/planner.html"></iframe>
</div>

<script>
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('collapsed');
}

function switchTo(name, btn) {
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('iframe').forEach(f => f.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('frame-' + name).classList.add('active');
}
</script>
</body>
</html>
