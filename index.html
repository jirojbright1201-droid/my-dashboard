<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', system-ui, sans-serif; background: #ffffff; color: #0a0b0d; height: 100vh; display: flex; overflow: hidden; }

/* Sidebar */
.sidebar {
  width: 220px; min-width: 220px; background: #ffffff;
  border-right: 1px solid #ebecf0;
  display: flex; flex-direction: column;
  transition: width 0.2s ease, min-width 0.2s ease;
  overflow: hidden;
}
.sidebar.collapsed { width: 52px; min-width: 52px; }

.sidebar-header {
  height: 60px; display: flex; align-items: center; gap: 12px;
  padding: 0 14px; border-bottom: 1px solid #ebecf0; flex-shrink: 0;
}
.ham-btn {
  background: none; border: none; cursor: pointer;
  width: 28px; height: 28px; flex-shrink: 0;
  display: flex; flex-direction: column; justify-content: center; gap: 5px;
  padding: 4px;
}
.ham-btn span { display: block; width: 20px; height: 2px; background: #5b616e; border-radius: 2px; transition: background 0.15s; }
.ham-btn:hover span { background: #0a0b0d; }
.sidebar-title {
  font-size: 0.9375rem; font-weight: 700; color: #0a0b0d;
  white-space: nowrap; overflow: hidden;
  transition: opacity 0.15s;
}
.sidebar.collapsed .sidebar-title { opacity: 0; pointer-events: none; }

.nav-list { padding: 12px 8px; display: flex; flex-direction: column; gap: 4px; }
.nav-item {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 10px; border-radius: 8px; cursor: pointer;
  background: none; border: none; color: #5b616e;
  font-size: 0.875rem; font-weight: 500; text-align: left;
  width: 100%; white-space: nowrap; overflow: hidden;
  transition: background 0.15s, color 0.15s;
}
.nav-item:hover { background: #f5f6f8; color: #0a0b0d; }
.nav-item.active { background: rgba(0,82,255,0.08); color: #0052ff; font-weight: 600; }
.nav-icon { font-size: 1.1rem; flex-shrink: 0; width: 20px; text-align: center; }
.nav-label { overflow: hidden; transition: opacity 0.15s; }
.sidebar.collapsed .nav-label { opacity: 0; pointer-events: none; }

/* Main */
.main { flex: 1; overflow: hidden; position: relative; }
iframe { width: 100%; height: 100%; border: none; display: none; }
iframe.active { display: block; }

.topbar-ham { display: none; }

/* Mobile overlay */
.backdrop {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.6); z-index: 10;
}
.backdrop.show { display: block; }

@media (max-width: 768px) {
  .sidebar {
    position: fixed; top: 0; left: 0; height: 100%;
    z-index: 20; transform: translateX(-100%);
    transition: transform 0.2s ease;
    width: 220px !important; min-width: 220px !important;
  }
  .sidebar.mobile-open { transform: translateX(0); }
  .sidebar.collapsed .sidebar-title { opacity: 1; pointer-events: auto; }
  .sidebar.collapsed .nav-label { opacity: 1; pointer-events: auto; }

  .topbar-ham {
    display: flex; align-items: center; height: 52px;
    padding: 0 14px; background: #ffffff;
    border-bottom: 1px solid #ebecf0; flex-shrink: 0;
  }
  .main { display: flex; flex-direction: column; }
  .main iframe { flex: 1; height: 0; }
}

</style>
</head>
<body>

<div class="backdrop" id="backdrop" onclick="closeSidebar()"></div>

<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <button class="ham-btn" onclick="toggleSidebar()">
      <span></span><span></span><span></span>
    </button>
    <span class="sidebar-title">Dashboard</span>
  </div>
  <div class="nav-list">
    <button class="nav-item active" onclick="switchTo('money', this)">
      <span class="nav-icon"><svg class="nav-icon-svg" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle"><path d="M3 7V5.5A1.5 1.5 0 0 1 4.5 4H16a1.5 1.5 0 0 1 1.5 1.5V7"/><path d="M3 7h16.5A1.5 1.5 0 0 1 21 8.5v9A1.5 1.5 0 0 1 19.5 19h-15A1.5 1.5 0 0 1 3 17.5V7z"/><circle cx="16.5" cy="13" r="1.15" fill="currentColor" stroke="none"/></svg></span>
      <span class="nav-label">Money Tracker</span>
    </button>
    <button class="nav-item" onclick="switchTo('planner', this)">
      <span class="nav-icon"><svg class="nav-icon-svg" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle"><rect x="3" y="4.5" width="18" height="16.5" rx="2"/><path d="M3 9.5h18M8 2.5v4M16 2.5v4"/></svg></span>
      <span class="nav-label">Planner Tracker</span>
    </button>
  </div>
</div>

<div class="main">
  <div class="topbar-ham">
    <button class="ham-btn" onclick="toggleSidebar()">
      <span></span><span></span><span></span>
    </button>
  </div>
  <iframe id="frame-money"  src="Money Tracker/index.html"       class="active"></iframe>
  <iframe id="frame-planner" src="Planner Tracker/planner.html"></iframe>
</div>

<script>
const isMobile = () => window.innerWidth <= 768;

function toggleSidebar() {
  const sb = document.getElementById('sidebar');
  const bd = document.getElementById('backdrop');
  if (isMobile()) {
    const open = sb.classList.toggle('mobile-open');
    bd.classList.toggle('show', open);
  } else {
    sb.classList.toggle('collapsed');
  }
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('mobile-open');
  document.getElementById('backdrop').classList.remove('show');
}

function switchTo(name, btn) {
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('iframe').forEach(f => f.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('frame-' + name).classList.add('active');
  if (isMobile()) closeSidebar();
}
</script>
</body>
</html>
