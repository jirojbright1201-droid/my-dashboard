<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Dashboard</title>
<link rel="manifest" href="./manifest.webmanifest">
<link rel="icon" type="image/png" href="./icons/icon-192.png">
<meta name="theme-color" content="#ffffff">
<link rel="apple-touch-icon" href="./icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Dashboard">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Cormorant+Garamond:wght@500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./app.css">
<link rel="stylesheet" href="./views/home.css">
<link rel="stylesheet" href="./views/planner.css">
<link rel="stylesheet" href="./views/savings.css">
<link rel="stylesheet" href="./views/money.css">
<link rel="stylesheet" href="./views/investment.css">
<link rel="stylesheet" href="./views/capture.css">
</head>
<body>

<div class="scroll">
  <div class="app-head">
    <div class="app-head-in">
      <div class="app-title">
        <svg class="spike" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" aria-hidden="true"><path d="M12 3v18M3 12h18M5.6 5.6l12.8 12.8M18.4 5.6L5.6 18.4"/></svg>
        <span id="appTitle">Planner</span>
      </div>
      <div class="app-head-slot" id="appHeadSlot"></div>
    </div>
  </div>

  <div class="view active" id="view-home"></div>

  <div class="view" id="view-planner"></div>

  <div class="view" id="view-money"></div>

  <div class="view" id="view-investment"></div>
</div>

<div class="install-bar" id="installBar">
  <div class="install-txt">ติดตั้งเป็นแอป — เปิดเต็มจอ ไม่มีแถบเบราว์เซอร์</div>
  <button class="install-btn" id="installBtn">ติดตั้ง</button>
  <button class="install-x" id="installX" aria-label="ปิด">&#10005;</button>
</div>

<button class="fab" id="fab" aria-label="จดเร็ว">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
  <span class="fab-badge" id="fabBadge"></span>
</button>
<div class="overlay" id="capOverlay">
  <div class="modal">
    <div class="sheet-handle"></div>
    <div class="modal-head">
      <div><div class="modal-title">จดเร็ว</div><div class="modal-sub">เก็บไว้ก่อน เดี๋ยว Jarvis ดึงไปลงระบบให้</div></div>
      <button class="modal-close" id="capClose"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg></button>
    </div>
    <div class="modal-body">
      <div class="cap-types" id="capTypes"></div>
      <div class="cap-input-row">
        <input id="capText" placeholder="จดอะไรไว้... เช่น ซื้อกาแฟ" autocomplete="off">
        <input id="capAmount" class="cap-amt" placeholder="บาท" inputmode="decimal" autocomplete="off">
      </div>
      <button class="cap-add" id="capAdd">เพิ่มเข้ากล่อง</button>
      <div class="cap-list-head" id="capListHead"></div>
      <div class="cap-list" id="capList"></div>
      <div class="cap-actions" id="capActions"></div>
    </div>
  </div>
</div>

<nav class="bnav">
  <button class="bn active" data-view="home">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5L12 3l9 7.5"/><path d="M5 9.5V20h14V9.5"/><path d="M9.5 20v-6h5v6"/></svg>
    <span class="bn-lab">Home</span>
  </button>
  <button class="bn" data-view="planner">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="17" rx="2"/><path d="M3 9h18M8 2v4M16 2v4"/></svg>
    <span class="bn-lab">Planner</span>
  </button>
  <button class="bn" data-view="money">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7h18v10H3zM3 11h18"/><circle cx="8" cy="14" r="1"/></svg>
    <span class="bn-lab">Money</span>
  </button>
  <button class="bn" data-view="investment">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 18l5-5 4 3 7-8"/><path d="M16 8h5v5"/></svg>
    <span class="bn-lab">Invest</span>
  </button>
</nav>

<script src="./data/planner.data.js"></script>
<script src="./views/planner.js"></script>
<script src="./data/savings.data.js"></script>
<script src="./views/savings.js"></script>
<script src="./data/money.data.js"></script>
<script src="./data/subscriptions.data.js"></script>
<script src="./views/money.js"></script>
<script src="./Investment%20Tracker/data.js"></script>
<script src="./views/investment.js"></script>
<script src="./views/home.js"></script>
<script src="./app.js"></script>
<script src="./views/capture.js"></script>

<script>
// network-first SW: ออนไลน์ดึงไฟล์สดเสมอ (revalidate กับ server), ออฟไลน์ใช้ cache
if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');
</script>
</body>
</html>
