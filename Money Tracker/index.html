<style>
  :root {
    --bg: #f2f2f7;            /* iOS system grouped background */
    --card: #ffffff;
    --sep: #e3e3e8;           /* hairline separator */
    --label: #8a8a8e;         /* secondary label gray */
    --label-2: #aeaeb2;
    --text: #0a0b0d;
    --tint: #0052ff;          /* brand blue accent */
    --tint-deep: #0043d6;
    --up: #098551; --down: #cf202f;
    --track: #e5e5ea;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { overscroll-behavior-y: contain; }
  body {
    font-family: 'Inter', -apple-system, system-ui, 'Helvetica Neue', Arial, sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; -webkit-font-smoothing: antialiased;
    -webkit-user-select: none; user-select: none;
    -webkit-overflow-scrolling: touch;
  }

  .container { max-width: 640px; margin: 0 auto; padding: 0 16px calc(40px + env(safe-area-inset-bottom)); }

  /* ── Sticky month header ── */
  .mhead {
    position: sticky; top: 0; z-index: 30;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    height: 52px; margin: 0 -16px 6px; padding: 0 16px;
    background: rgba(242,242,247,0.82);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    backdrop-filter: saturate(180%) blur(20px);
    border-bottom: 1px solid rgba(0,0,0,0.06);
  }
  .month-label { font-size: 1.0625rem; font-weight: 700; letter-spacing: -0.02em; min-width: 150px; text-align: center; }
  .chev {
    background: none; border: none; cursor: pointer;
    width: 40px; height: 40px; border-radius: 50%;
    font-size: 1.5rem; line-height: 1; color: var(--tint);
    display: flex; align-items: center; justify-content: center;
    transition: background .15s;
  }
  .chev:active { background: rgba(0,0,0,0.06); }
  .chev:disabled { color: var(--label-2); cursor: default; }

  /* ── Section header (grouped-list style) ── */
  .group-title {
    font-size: 0.75rem; font-weight: 600; color: var(--label);
    text-transform: uppercase; letter-spacing: 0.04em;
    padding: 22px 16px 7px;
  }

  /* ── Hero summary ── */
  .hero {
    background: var(--card); border-radius: 14px; padding: 20px 20px 6px;
    margin-top: 8px; box-shadow: 0 1px 2px rgba(0,0,0,0.04);
  }
  .hero-label { font-size: 0.8125rem; color: var(--label); font-weight: 500; }
  .hero-bal { font-size: 2.375rem; font-weight: 800; letter-spacing: -0.03em; margin-top: 2px; line-height: 1.1; }
  .hero-sub { font-size: 0.8125rem; color: var(--label); margin-top: 4px; }
  .hero-split { display: flex; margin-top: 16px; border-top: 1px solid var(--sep); }
  .hs { flex: 1; padding: 14px 4px 16px; }
  .hs + .hs { border-left: 1px solid var(--sep); padding-left: 18px; }
  .hs-lab { font-size: 0.75rem; color: var(--label); font-weight: 500; }
  .hs-val { font-size: 1.25rem; font-weight: 700; letter-spacing: -0.02em; margin-top: 3px; }
  .hs-val.up { color: var(--up); }
  .hs-val.down { color: var(--down); }
  .hs-cnt { font-size: 0.6875rem; color: var(--label-2); margin-top: 3px; }

  /* ── Grouped list card ── */
  .list { background: var(--card); border-radius: 14px; overflow: hidden; box-shadow: 0 1px 2px rgba(0,0,0,0.04); }
  .card { background: var(--card); border-radius: 14px; padding: 16px; box-shadow: 0 1px 2px rgba(0,0,0,0.04); }

  .row { position: relative; display: flex; align-items: center; gap: 12px; padding: 11px 16px; min-height: 56px; }
  .row:not(:last-child)::after { content: ''; position: absolute; left: 66px; right: 0; bottom: 0; height: 1px; background: var(--sep); }
  .tappable { cursor: pointer; transition: background .12s; }
  .tappable:active { background: #ededf2; }
  .row-lead { flex: 1; min-width: 0; }

  /* Icon tile (My Bills-style) */
  .tile { width: 38px; height: 38px; border-radius: 10px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,82,255,0.10); color: var(--tint); }
  .tile svg { width: 21px; height: 21px; }
  .row-title { font-size: 0.9375rem; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .row-sub { font-size: 0.75rem; color: var(--label); margin-top: 2px; }
  .row-amt { font-size: 0.9375rem; font-weight: 700; flex-shrink: 0; }
  .row-amt.neg { color: var(--down); }
  .row-amt.pos { color: var(--up); }
  .chev-r::after { content: '›'; color: var(--label-2); font-size: 1.15rem; font-weight: 600; margin-left: 2px; }

  /* ── Budget row (stacked) ── */
  .brow { position: relative; display: flex; gap: 12px; align-items: flex-start; padding: 13px 16px; cursor: pointer; transition: background .12s; }
  .brow:not(:last-child)::after { content: ''; position: absolute; left: 66px; right: 0; bottom: 0; height: 1px; background: var(--sep); }
  .brow:active { background: #ededf2; }
  .brow .tile { margin-top: 1px; }
  .brow-body { flex: 1; min-width: 0; }
  .brow-head { display: flex; justify-content: space-between; align-items: baseline; gap: 10px; margin-bottom: 9px; }
  .brow-name { font-size: 0.9375rem; font-weight: 600; }
  .brow-amt { font-size: 0.75rem; color: var(--label); white-space: nowrap; }
  .prog { height: 6px; background: var(--track); border-radius: 99px; overflow: hidden; }
  .prog-fill { height: 100%; background: var(--tint); border-radius: 99px; transition: width .3s ease; }
  .prog-fill.over { background: var(--down); }
  .brow-foot { display: flex; justify-content: space-between; font-size: 0.75rem; margin-top: 7px; }
  .pct { font-weight: 700; color: var(--text); }
  .pct.over { color: var(--down); }
  .rem { color: var(--label); }
  .rem.over { color: var(--down); font-weight: 600; }

  .chart-wrap { position: relative; height: 200px; }

  .empty { text-align: center; color: var(--label); font-size: 0.875rem; padding: 26px 0; }

  /* ── Bottom sheet ── */
  .sheet-ov {
    position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100;
    opacity: 0; pointer-events: none; transition: opacity .25s ease;
  }
  .sheet-ov.active { opacity: 1; pointer-events: auto; }
  .sheet {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 101;
    background: var(--bg); border-radius: 16px 16px 0 0;
    transform: translateY(100%); transition: transform .32s cubic-bezier(.32,.72,0,1);
    max-height: 86vh; display: flex; flex-direction: column;
    padding-bottom: env(safe-area-inset-bottom);
  }
  .sheet.active { transform: translateY(0); }
  .sheet-grab { width: 38px; height: 5px; background: #c7c7cc; border-radius: 99px; margin: 8px auto 4px; flex-shrink: 0; }
  .sheet-head { padding: 8px 20px 14px; flex-shrink: 0; }
  .sheet-title { font-size: 1.375rem; font-weight: 800; letter-spacing: -0.02em; }
  .sheet-sub { font-size: 0.8125rem; color: var(--label); margin-top: 3px; }
  .sheet-body { overflow-y: auto; padding: 0 16px 20px; -webkit-overflow-scrolling: touch; }
  .sheet-body .row:not(:last-child)::after { left: 16px; }

  @media (min-width: 700px) {
    .chart-wrap { height: 240px; }
  }
</style>
</head>

<div class="container">

  <div class="group-title">Budget vs จ่ายจริง</div>
  <section class="card"><div class="chart-wrap"><canvas id="barChart"></canvas></div></section>

  <div class="group-title">สัดส่วนรายจ่าย</div>
  <section class="card"><div class="chart-wrap"><canvas id="donutChart"></canvas></div></section>

  <div class="group-title">รายจ่ายล่าสุด</div>
  <section class="list" id="expenseList"></section>

  <div class="group-title">รายรับ</div>
  <section class="list" id="incomeList"></section>
</div>

<!-- Bottom sheet: category history -->
<div class="sheet-ov" id="sheetOv" onclick="closeSheet()"></div>
<div class="sheet" id="sheet">

    <div class="sheet-title" id="sheetTitle"></div>
    <div class="sheet-sub" id="sheetSub"></div>
  </div>
  <div class="sheet-body" id="sheetBody"></div>
</div>

    { label: 'จ่ายจริง',  data: [], backgroundColor: '#0052ff', borderWidth: 0, borderRadius: 6, borderSkipped: false },
  ]},
  options: {
    responsive: true, maintainAspectRatio: false,
    plugins: { legend: { labels: { color: '#5b616e', font: { size: 11 }, usePointStyle: true, pointStyle: 'circle', boxWidth: 6, padding: 14 } } },
    scales: {
      x: { ticks: { color: '#8a8a8e', font: { size: 9 } }, grid: { display: false }, border: { display: false } },
      y: { ticks: { color: '#8a8a8e', font: { size: 10 } }, grid: { color: '#ededf2' }, border: { display: false } }
    }
  }
});

const donutChart = new Chart(document.getElementById('donutChart'), {
  type: 'doughnut',
  data: { labels: [], datasets: [{ data: [], backgroundColor: [], borderWidth: 3, borderColor: '#ffffff' }] },
  options: {
    responsive: true, maintainAspectRatio: false, cutout: '68%',
    plugins: { legend: { position: 'bottom', labels: { color: '#5b616e', font: { size: 10 }, padding: 11, usePointStyle: true, pointStyle: 'circle', boxWidth: 6 } } }
  }
});

function render() {
  const key = KEYS[currentIdx];
  const data = ALL_DATA[key];
  const budget = data.budget || {};
  const income = data.income || [];
  const expenses = data.expenses || [];

  document.getElementById('monthLabel').textContent = monthLabel(key);
  document.getElementById('btnPrev').disabled = currentIdx <= 0;
  document.getElementById('btnNext').disabled = currentIdx >= KEYS.length - 1;

  const totalIncome  = income.reduce((s, i) => s + i.amount, 0);
  const totalExpense = expenses.reduce((s, e) => s + e.amount, 0);
  const balance = totalIncome - totalExpense;
  const totalBudget = Object.values(budget).reduce((s, v) => s + v, 0);

  document.getElementById('sumBalance').textContent = fmtMoney(balance);
  document.getElementById('sumBalance').style.color = balance >= 0 ? 'var(--text)' : 'var(--down)';
  document.getElementById('subBalance').textContent = 'Budget รวม ' + fmtMoney(totalBudget);
  document.getElementById('sumIncome').textContent  = fmtMoney(totalIncome);
  document.getElementById('subIncome').textContent  = income.length + ' รายการ';
  document.getElementById('sumExpense').textContent = fmtMoney(totalExpense);
  document.getElementById('subExpense').textContent = expenses.length + ' รายการ';

  // Budget rows
  const spentByCat = {};
  expenses.forEach(e => { spentByCat[e.category] = (spentByCat[e.category] || 0) + e.amount; });
  const budgetRows = Object.entries(budget).sort((a,b) => b[1]-a[1]);

  document.getElementById('budgetList').innerHTML = budgetRows.map(([cat, alloc]) => {
    const spent = spentByCat[cat] || 0;
    const pct = alloc > 0 ? Math.min(100, Math.round(spent / alloc * 100)) : 0;
    const over = spent > alloc;
    return `<div class="brow" onclick="openSheet('${cat}')">
      ${catTile(cat)}
      <div class="brow-body">
        <div class="brow-head">
          <span class="brow-name">${cat}</span>
          <span class="brow-amt">฿${spent.toLocaleString()} / ฿${alloc.toLocaleString()}</span>
        </div>
        <div class="prog"><div class="prog-fill ${over ? 'over' : ''}" style="width:${pct}%"></div></div>
        <div class="brow-foot">
          <span class="pct ${over ? 'over' : ''}">${pct}%</span>
          <span class="rem ${over ? 'over' : ''}">${over ? 'เกิน ฿'+(spent-alloc).toLocaleString() : 'เหลือ ฿'+(alloc-spent).toLocaleString()}</span>
        </div>
      </div>
    </div>`;
  }).join('');

  // Bar chart
  barChart.data.labels = budgetRows.map(r => r[0]);
  barChart.data.datasets[0].data = budgetRows.map(r => r[1]);
  barChart.data.datasets[1].data = budgetRows.map(r => spentByCat[r[0]] || 0);
  barChart.update();

  // Donut chart — เรียงยอดน้อย→มาก ไล่เฉดน้ำเงินอ่อน→เข้ม
  const donutPairs = Object.entries(spentByCat).sort((a, b) => a[1] - b[1]);
  const donutCats = donutPairs.map(p => p[0]);
  const donutVals = donutPairs.map(p => p[1]);
  const dn = donutCats.length;
  donutChart.data.labels = dn ? donutCats : ['ไม่มีรายจ่าย'];
  donutChart.data.datasets[0].data = dn ? donutVals : [1];
  donutChart.data.datasets[0].backgroundColor = dn
    ? donutCats.map((c, i) => CAT_COLORS[c] || DONUT_COLORS[Math.round(i / Math.max(dn - 1, 1) * (DONUT_COLORS.length - 1))])
    : [DONUT_COLORS[0]];
  donutChart.update();

  // Latest expenses
  document.getElementById('expenseList').innerHTML = [...expenses].sort((a,b)=>b.date.localeCompare(a.date)).slice(0, 6).map(e =>
    `<div class="row">${catTile(e.category)}<div class="row-lead"><div class="row-title">${e.name}</div><div class="row-sub">${e.category} · ${fmtDate(e.date)}</div></div><div class="row-amt neg">-฿${e.amount.toLocaleString()}</div></div>`
  ).join('') || '<div class="empty">ไม่มีรายจ่าย</div>';

  // Income
  document.getElementById('incomeList').innerHTML = income.map(i =>
    `<div class="row">${srcTile(i.source)}<div class="row-lead"><div class="row-title">${i.name || i.source}</div><div class="row-sub">${i.source} · ${fmtDate(i.date)}</div></div><div class="row-amt pos">+฿${i.amount.toLocaleString()}</div></div>`
  ).join('') || '<div class="empty">ไม่มีรายรับ</div>';
}

function changeMonth(dir) {
  currentIdx = Math.max(0, Math.min(KEYS.length - 1, currentIdx + dir));
  render();
}

function openSheet(cat) {
  const data = ALL_DATA[KEYS[currentIdx]];
  const items = (data.expenses || []).filter(e => e.category === cat).sort((a,b)=>b.date.localeCompare(a.date));
  const total = items.reduce((s, e) => s + e.amount, 0);
  document.getElementById('sheetTitle').textContent = cat;
  document.getElementById('sheetSub').textContent = items.length
    ? items.length + ' รายการ · รวม ฿' + total.toLocaleString()
    : 'ยังไม่มีรายการ';
  document.getElementById('sheetBody').innerHTML = items.length
    ? `<div class="list">${items.map(e => `<div class="row"><div class="row-lead"><div class="row-title">${e.name}</div><div class="row-sub">${fmtDate(e.date)}${e.notes ? ' · '+e.notes : ''}</div></div><div class="row-amt neg">-฿${e.amount.toLocaleString()}</div></div>`).join('')}</div>`
    : '<div class="empty">ยังไม่มีรายจ่ายในหมวดนี้</div>';
  document.getElementById('sheetOv').classList.add('active');
  document.getElementById('sheet').classList.add('active');
}

function closeSheet() {
  document.getElementById('sheetOv').classList.remove('active');
  document.getElementById('sheet').classList.remove('active');
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeSheet(); });

render();
</script>
</body>
</html>
