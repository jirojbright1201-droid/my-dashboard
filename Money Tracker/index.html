<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Money Dashboard</title>
<link rel="icon" type="image/png" href="../icons/icon-192.png">
<link rel="apple-touch-icon" href="../icons/icon-192.png">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    /* Coinbase Light — brand blue #0052FF on white */
    --blue: #0052ff; --blue-deep: #0043d6; --blue-soft: rgba(0,82,255,0.08);
    --green: #0052ff; --green-deep: #0043d6;          /* legacy aliases → brand blue */
    --up: #098551; --down: #cf202f;
    --bg: #ffffff; --surface: #ffffff; --surface-2: #f5f6f8; --surface-3: #eef0f3;
    --text: #0a0b0d; --silver: #5b616e; --near-white: #1f2128;
    --border: #d7dae0; --border-soft: #ebecf0;
    --error: #cf202f; --warning: #b8860b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', 'Helvetica Neue', -apple-system, system-ui, Arial, sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; -webkit-font-smoothing: antialiased;
  }

  .topbar {
    background: var(--bg); color: var(--text);
    padding: 0 24px; height: 60px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 50;
    border-bottom: 1px solid var(--border-soft);
  }
  .topbar h1 { font-size: 1.25rem; font-weight: 700; letter-spacing: -0.3px; color: var(--green); }
  .topbar-right { display: flex; align-items: center; gap: 20px; }
  .updated { color: var(--silver); font-size: 0.75rem; }

  .month-picker { display: flex; align-items: center; gap: 8px; }
  .month-picker button {
    background: var(--surface-2); border: none; border-radius: 9999px;
    width: 38px; height: 38px; cursor: pointer; font-size: 0.95rem;
    display: flex; align-items: center; justify-content: center;
    color: var(--text); transition: background .15s, transform .1s;
  }
  .month-picker button:hover { background: var(--surface-3); }
  .month-picker button:active { transform: scale(0.94); }
  .month-picker button:disabled { opacity: 0.3; cursor: default; }
  .month-label { font-size: 0.9375rem; font-weight: 700; min-width: 120px; text-align: center; color: var(--text); }

  .container { max-width: 1100px; margin: 0 auto; padding: 36px 24px 64px; }

  .summary-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 28px; }
  .card { background: var(--surface); border: 1px solid var(--border-soft); border-radius: 12px; padding: 22px 24px; }
  .card .label { font-size: 0.6875rem; color: var(--silver); font-weight: 700; text-transform: uppercase; letter-spacing: 1.4px; margin-bottom: 10px; }
  .card .value { font-size: 1.875rem; font-weight: 700; letter-spacing: -0.5px; color: var(--text); }
  .card .sub { font-size: 0.8125rem; color: var(--silver); margin-top: 8px; }

  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 28px; }
  .grid2-wide { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; margin-bottom: 28px; }

  .section-title { font-size: 1.125rem; font-weight: 700; color: var(--text); margin-bottom: 16px; }

  .budget-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
  .budget-card {
    background: var(--surface-2); border-radius: 8px; padding: 16px 18px;
    cursor: pointer; transition: background .2s;
  }
  .budget-card:hover { background: var(--surface-3); }
  .budget-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .cat-name { font-size: 0.9375rem; font-weight: 700; color: var(--text); }
  .budget-amounts { color: var(--silver); font-size: 0.75rem; }
  .progress-bar { height: 5px; background: var(--border); border-radius: 9999px; overflow: hidden; margin-bottom: 9px; }
  .progress-fill { height: 100%; background: var(--green); border-radius: 9999px; transition: width .3s ease; }
  .progress-fill.over { background: var(--error); }
  .budget-footer { display: flex; justify-content: space-between; font-size: 0.75rem; }
  .pct { color: var(--near-white); font-weight: 700; }
  .pct.over { color: var(--error); }
  .remaining { color: var(--silver); }
  .remaining.over { color: var(--error); font-weight: 700; }

  .chart-card { background: var(--surface); border: 1px solid var(--border-soft); border-radius: 12px; padding: 22px 24px; }
  .chart-wrap { position: relative; height: 240px; }

  table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
  th { color: var(--silver); font-weight: 700; font-size: 0.6875rem; text-transform: uppercase; letter-spacing: 1px; padding: 0 10px 12px; text-align: left; border-bottom: 1px solid var(--border-soft); }
  td { padding: 12px 10px; border-bottom: 1px solid var(--border-soft); color: var(--near-white); }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--surface-2); }
  .amount-pos { color: var(--blue); font-weight: 700; text-align: right; }
  .amount-neg { color: var(--down); font-weight: 700; text-align: right; }
  .cat-label { font-size: 0.75rem; color: var(--silver); }

  /* Modal */
  .overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(10,11,13,0.45); z-index: 100;
    align-items: center; justify-content: center;
  }
  .overlay.active { display: flex; }
  .modal {
    background: var(--surface); border: 1px solid var(--border-soft); border-radius: 14px; width: 460px; max-width: 95vw;
    max-height: 80vh; display: flex; flex-direction: column; overflow: hidden;
    box-shadow: rgba(10,11,13,0.12) 0 12px 32px;
  }
  .modal-head {
    padding: 24px 24px 16px; border-bottom: 1px solid var(--border-soft);
    display: flex; justify-content: space-between; align-items: flex-start; flex-shrink: 0;
  }
  .modal-title { font-size: 1.25rem; font-weight: 700; color: var(--text); }
  .modal-sub { font-size: 0.875rem; color: var(--silver); margin-top: 4px; }
  .modal-close {
    background: var(--surface-2); border: none; cursor: pointer; border-radius: 9999px;
    width: 36px; height: 36px; font-size: 0.95rem; color: var(--text); flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; transition: background .15s, transform .1s;
  }
  .modal-close:hover { background: var(--border); }
  .modal-close:active { transform: scale(0.94); }
  .modal-body { overflow-y: auto; }
  .modal-empty { padding: 36px; text-align: center; color: var(--silver); font-size: 0.875rem; }
  .modal table { font-size: 0.875rem; }
  .modal th { padding: 16px 24px 10px; }
  .modal td { padding: 12px 24px; }

  @media (max-width: 768px) {
    body { overflow-x: hidden; }
    .summary-grid, .grid2, .grid2-wide { grid-template-columns: 1fr; }
    .topbar { flex-wrap: wrap; height: auto; padding: 10px 14px; gap: 8px; }
    .container { padding: 20px 12px 48px; }
    .budget-grid { grid-template-columns: 1fr 1fr; }
    .budget-header { flex-direction: column; align-items: flex-start; gap: 2px; }
    .cat-name { font-size: 0.875rem; }
    .budget-amounts { font-size: 0.6875rem; }
  }
</style>
</head>
<body>

        <tbody id="incomeRows"></tbody>

    </div>
  </div>
</div>

<!-- Modal -->
<div class="overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-head">

      </div>
      <button class="modal-close" onclick="closeOverlay()">&#x2715;</button>
    </div>
    <div class="modal-body" id="modalBody"></div>

</div>

function fmtDate(d) {
  if (!d) return '';
  const [y, m, day] = d.split('-');
  return `${day}/${m}/${y}`;
}
function fmtMoney(n) { return '฿' + n.toLocaleString(); }
function monthLabel(key) {
  const [y, m] = key.split('-');
  const d = new Date(+y, +m - 1, 1);
  return d.toLocaleDateString('th-TH', { month: 'long', year: 'numeric' });

function render() {
  const key = KEYS[currentIdx];
  const data = ALL_DATA[key];
  const budget = data.budget || {};
  const income = data.income || [];
  const expenses = data.expenses || [];

  // Month label + nav
  document.getElementById('monthLabel').textContent = monthLabel(key);
  document.getElementById('btnPrev').disabled = currentIdx <= 0;
  document.getElementById('btnNext').disabled = currentIdx >= KEYS.length - 1;

  // Summary
  const totalIncome  = income.reduce((s, i) => s + i.amount, 0);
  const totalExpense = expenses.reduce((s, e) => s + e.amount, 0);
  const balance = totalIncome - totalExpense;
  const totalBudget = Object.values(budget).reduce((s, v) => s + v, 0);

  document.getElementById('sumIncome').textContent  = fmtMoney(totalIncome);
  document.getElementById('subIncome').textContent  = income.length + ' รายการ';
  document.getElementById('sumExpense').textContent = fmtMoney(totalExpense);
  document.getElementById('subExpense').textContent = expenses.length + ' รายการ';
  document.getElementById('sumBalance').textContent = fmtMoney(balance);
  document.getElementById('subBalance').textContent = 'Budget รวม ' + fmtMoney(totalBudget);
  const bc = document.getElementById('cardBalance');
  bc.className = 'card ' + (balance >= 0 ? 'balance' : 'balance-neg');
  document.getElementById('sumBalance').style.color = balance >= 0 ? '#0a0b0d' : '#cf202f';

  // Budget cards
  const spentByCat = {};
  expenses.forEach(e => { spentByCat[e.category] = (spentByCat[e.category] || 0) + e.amount; });
  const budgetRows = Object.entries(budget).sort((a,b) => b[1]-a[1]);

  document.getElementById('budgetGrid').innerHTML = budgetRows.map(([cat, alloc]) => {
    const spent = spentByCat[cat] || 0;
    const pct = alloc > 0 ? Math.min(100, Math.round(spent / alloc * 100)) : 0;
    const over = spent > alloc;
    return `<div class="budget-card ${over ? 'over' : ''}" onclick="showHistory('${cat}')">
      <div class="budget-header">
        <span class="cat-name">${cat}</span>
        <span class="budget-amounts">฿${spent.toLocaleString()} / ฿${alloc.toLocaleString()}</span>
      </div>
      <div class="progress-bar"><div class="progress-fill ${over ? 'over' : ''}" style="width:${pct}%"></div></div>
      <div class="budget-footer">
        <span class="pct ${over ? 'over' : ''}">${pct}%</span>
        <span class="remaining ${over ? 'over' : ''}">${over ? 'เกิน ฿'+(spent-alloc).toLocaleString() : 'เหลือ ฿'+(alloc-spent).toLocaleString()}</span>
      </div>
    </div>`;
  }).join('');

  // Bar chart
  barChart.data.labels = budgetRows.map(r => r[0]);
  barChart.data.datasets[0].data = budgetRows.map(r => r[1]);
  barChart.data.datasets[1].data = budgetRows.map(r => spentByCat[r[0]] || 0);
  barChart.update();

  // Donut chart — เรียงยอดน้อย→มาก แล้วไล่เฉดเขียวอ่อน(น้อย)→เข้ม(มาก) เป็นกราเดียนต์
  const donutPairs = Object.entries(spentByCat).sort((a, b) => a[1] - b[1]);
  const donutCats = donutPairs.map(p => p[0]);
  const donutVals = donutPairs.map(p => p[1]);
  const dn = donutCats.length;
  donutChart.data.labels = dn ? donutCats : ['ไม่มีรายจ่าย'];
  donutChart.data.datasets[0].data = dn ? donutVals : [1];
  donutChart.data.datasets[0].backgroundColor = dn
    ? donutCats.map((c, i) => CAT_COLORS[c] || DONUT_COLORS[Math.round(i / Math.max(dn - 1, 1) * (DONUT_COLORS.length - 1))])
    : [DONUT_COLORS[0]];
  donutChart.update();

  // Expense table
  document.getElementById('expenseRows').innerHTML = [...expenses].sort((a,b)=>b.date.localeCompare(a.date)).slice(0, 5).map(e =>
    `<tr><td>${fmtDate(e.date)}</td><td>${e.name}</td><td class="cat-label">${e.category}</td><td class="amount-neg">-฿${e.amount.toLocaleString()}</td></tr>`
  ).join('') || '<tr><td colspan="4" style="text-align:center;color:#8a919e;padding:20px">ไม่มีรายจ่าย</td></tr>';

  // Income table
  document.getElementById('incomeRows').innerHTML = income.map(i =>
    `<tr><td>${fmtDate(i.date)}</td><td>${i.source}</td><td class="amount-pos">+฿${i.amount.toLocaleString()}</td></tr>`
  ).join('') || '<tr><td colspan="3" style="text-align:center;color:#8a919e;padding:20px">ไม่มีรายรับ</td></tr>';
}

function changeMonth(dir) {
  currentIdx = Math.max(0, Math.min(KEYS.length - 1, currentIdx + dir));
  render();
}

function showHistory(cat) {
  const data = ALL_DATA[KEYS[currentIdx]];
  const items = (data.expenses || []).filter(e => e.category === cat);
  const total = items.reduce((s, e) => s + e.amount, 0);
  document.getElementById('modalTitle').textContent = cat;
  document.getElementById('modalSub').textContent = items.length
    ? items.length + ' รายการ · รวม ฿' + total.toLocaleString()
    : 'ไม่มีรายการ';
  document.getElementById('modalBody').innerHTML = items.length
    ? `<table>
        <thead><tr><th>วันที่</th><th>รายการ</th><th style="text-align:right">จำนวน</th></tr></thead>
        <tbody>${items.map(e => `<tr><td>${fmtDate(e.date)}</td><td>${e.name}</td><td class="amount-neg" style="text-align:right">-฿${e.amount.toLocaleString()}</td></tr>`).join('')}</tbody>
      </table>`
    : '<div class="modal-empty">ยังไม่มีรายจ่ายในหมวดนี้</div>';
  document.getElementById('overlay').classList.add('active');
}

function closeOverlay() { document.getElementById('overlay').classList.remove('active'); }
function closeModal(e) { if (e.target.id === 'overlay') closeOverlay(); }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeOverlay(); });

render();
</script>
</body>
</html>
