<!DOCTYPE html><html lang="th"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Jar styles</title>
<style>
  body{margin:0;background:#fff;font-family:system-ui,sans-serif;color:#141413;padding:24px}
  .row{display:flex;flex-wrap:wrap;gap:18px;justify-content:center;max-width:760px;margin:0 auto}
  .cell{flex:1;min-width:180px;background:#fff;border:1px solid #ebe6df;border-radius:16px;padding:18px 14px 16px;text-align:center}
  .tag{display:inline-block;font-size:12px;font-weight:800;color:#cc785c;letter-spacing:1px;margin-bottom:4px}
  .name{font-size:14px;font-weight:700;margin-bottom:12px}
  .jarbox{position:relative;width:96px;height:112px;margin:0 auto}
  .jar-glass{position:absolute;inset:0;width:100%;height:100%}
  .jar-clip{position:absolute;left:18px;right:18px;top:23px;bottom:9px;overflow:hidden;border-radius:12px}
  .jar-fill{position:absolute;left:0;right:0;bottom:0;overflow:hidden;display:flex;flex-wrap:wrap;align-content:flex-start;justify-content:center;padding-top:3px}
  .jc{font-size:13.5px;line-height:.9;margin:-.5px -1.2px}
  h2{text-align:center;color:#6c6a64;font-weight:700;margin:0 0 20px}
  .desc{font-size:12px;color:#6c6a64;margin-top:12px;line-height:1.4}
</style></head><body>
<h2>เลือกสไตล์โหล (ระดับ ~65%)</h2>
<div class="row" id="row"></div>
<script>
function glass(){return `<svg class="jar-glass" viewBox="0 0 96 112" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect x="26" y="6" width="44" height="11" rx="4" fill="#efece6" stroke="#d8cfc2" stroke-width="2"/>
  <rect x="18" y="22" width="60" height="82" rx="14" fill="#ffffff" stroke="#d8cfc2" stroke-width="2"/>
  <rect x="18" y="22" width="60" height="82" rx="14" fill="none" stroke="#d8cfc2" stroke-width="2"/>
  <path d="M27 33 v58" stroke="rgba(255,255,255,0.65)" stroke-width="3" stroke-linecap="round"/></svg>`;}

// A — ทองเหลวเนียน (ของเดิม) : gradient + เหรียญลอยผิวบน
function styleA(pct){
  const top=24,bot=102,h=bot-top,fillY=bot-h*pct;
  return `<div class="jarbox"><svg viewBox="0 0 96 112" fill="none" style="position:absolute;inset:0;width:100%;height:100%">
    <defs><linearGradient id="ga" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#f3cd83"/><stop offset="1" stop-color="#dca23f"/></linearGradient>
    <clipPath id="ca"><rect x="19" y="23" width="58" height="80" rx="13"/></clipPath></defs>
    <g clip-path="url(#ca)"><rect x="18" y="${fillY}" width="60" height="${bot-fillY+4}" fill="url(#ga)"/>
      <ellipse cx="39" cy="${fillY+5}" rx="9" ry="3.1" fill="#f7dca0"/>
      <ellipse cx="56" cy="${fillY+9}" rx="8" ry="2.9" fill="#e6b257"/>
      <ellipse cx="46" cy="${fillY+13}" rx="10" ry="3.2" fill="#f7dca0"/></g></svg>${glass()}</div>`;
}

// B — เหรียญ SVG มีมิติ (metallic radial + ขอบ + เงา + ตรา ฿)
function coinB(cx,cy){
  return `<g>
    <circle cx="${cx}" cy="${cy+0.8}" r="8.4" fill="#9c6f25"/>
    <circle cx="${cx}" cy="${cy}" r="8.4" fill="url(#gb)"/>
    <circle cx="${cx}" cy="${cy}" r="8.4" fill="none" stroke="#b07d20" stroke-width="1"/>
    <circle cx="${cx}" cy="${cy}" r="5.6" fill="none" stroke="#c8902c" stroke-width="0.8"/>
    <text x="${cx}" y="${cy+0.3}" font-size="7" font-weight="800" text-anchor="middle" dominant-baseline="central" fill="#a9772a" font-family="Georgia,serif">฿</text>
    <path d="M${cx-4} ${cy-3.4} a5.4 5.4 0 0 1 4-1.6" fill="none" stroke="#fdeec2" stroke-width="1.4" stroke-linecap="round" opacity="0.85"/>
  </g>`;
}
function styleB(pct){
  const top=24,bot=102,h=bot-top,fillY=bot-h*pct;
  let coins='',r=0;const rowH=9;
  const E=[31,46,61],O=[38.5,53.5];
  for(let y=bot-8;y>fillY-2&&y>top+2;y-=rowH,r++){const xs=(r%2===0)?E:O;xs.forEach(x=>coins+=coinB(x,y));}
  return `<div class="jarbox"><svg viewBox="0 0 96 112" fill="none" style="position:absolute;inset:0;width:100%;height:100%">
    <defs><radialGradient id="gb" cx="0.38" cy="0.32" r="0.8"><stop offset="0" stop-color="#fbe7a6"/><stop offset="0.55" stop-color="#eebb55"/><stop offset="1" stop-color="#d99e3a"/></radialGradient>
    <clipPath id="cb"><rect x="19" y="23" width="58" height="80" rx="13"/></clipPath></defs>
    <g clip-path="url(#cb)">${coins}</g></svg>${glass()}</div>`;
}

// C — เหรียญ emoji กอง (ตัวที่ push ล่าสุด)
function styleC(pct){
  const coins='<span class="jc">🪙</span>'.repeat(44);
  return `<div class="jarbox">${glass()}<div class="jar-clip"><div class="jar-fill" style="height:${pct*100}%">${coins}</div></div></div>`;
}

const pct=0.65;
document.getElementById('row').innerHTML = `
  <div class="cell"><span class="tag">A</span><div class="name">ทองเหลวเนียน</div>${styleA(pct)}<div class="desc">แบบเดิม พรีเมียม เรียบ มีเหรียญลอยผิวบนนิดหน่อย</div></div>
  <div class="cell"><span class="tag">B</span><div class="name">เหรียญวาดมีมิติ</div>${styleB(pct)}<div class="desc">เหรียญทอง SVG มีไล่แสง ขอบ เงา ตรา ฿</div></div>
  <div class="cell"><span class="tag">C</span><div class="name">เหรียญ emoji</div>${styleC(pct)}<div class="desc">เหรียญทอง emoji 🪙 (ตัวที่อยู่บนแอปตอนนี้)</div></div>`;
</script>
</body></html>
