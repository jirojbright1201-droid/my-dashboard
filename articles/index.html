<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Articles</title>
<link rel="manifest" href="./manifest.webmanifest">
<link rel="icon" type="image/png" href="../icons/articles-192.png">
<meta name="theme-color" content="#fbfaf8">
<link rel="apple-touch-icon" href="../icons/articles-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Articles">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Cormorant+Garamond:wght@500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../app.css">
<link rel="stylesheet" href="../views/articles.css">
<style>
  :root{ --nav-h: 0px; }
  .scroll{ padding-bottom: calc(112px + env(safe-area-inset-bottom)); }
  .install-bar{ bottom: calc(90px + env(safe-area-inset-bottom)); }
</style>
</head>
<body>

<div class="scroll">
  <div class="app-head">
    <div class="app-head-in">
      <div class="app-title">
        <svg class="spike" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 21a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1h8l5 5v12a1 1 0 0 1-1 1z"/><path d="M9 12.5h6M9 16.5h4"/></svg>
        <span>Articles</span>
      </div>
      <div class="app-head-slot" id="appHeadSlot"></div>
    </div>
  </div>
  <div class="view active" id="view-root"></div>
</div>

<div class="install-bar" id="installBar">
  <div class="install-txt">Install as an app — fullscreen, no browser bar</div>
  <button class="install-btn" id="installBtn">Install</button>
  <button class="install-x" id="installX" aria-label="Close">&#10005;</button>
</div>

<script>window.APP_VIEW = 'articles';</script>
<script src="../data/articles.data.js"></script>
<script src="../views/articles.js"></script>
<script src="../shared/boot.js"></script>
</body>
</html>
